function BackupsModal({ open, onClose, onRestore, onView, toast }) {
  const [snaps, setSnaps] = useState(loadSnapshots());

  useEffect(() => { if (open) setSnaps(loadSnapshots()); }, [open]);

  const refresh = () => setSnaps(loadSnapshots());

  const handlePin = (date, pinned) => { pinSnapshot(date, pinned); refresh(); };
  const handleDelete = (date) => {
    if (!confirm(`Delete snapshot from ${fmtDate(date)}?`)) return;
    deleteSnapshot(date); refresh(); toast('Snapshot deleted');
  };
  const handleDownload = (snap) => {
    try {
      const blob = new Blob([snap.payload], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `bikecare-erp-${snap.date}.json`;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(url);
    } catch (e) { toast('Download failed'); }
  };
  const handleView = (snap) => {
    try { onView(JSON.parse(snap.payload), snap.date); }
    catch (e) { toast('Snapshot corrupted'); }
  };
  const handleRestore = (snap) => {
    if (!confirm(`Restore the books to their state on ${fmtDate(snap.date)}?\n\nThis will overwrite current data on this device AND in the cloud. (Today's snapshot is taken automatically before this happens.)`)) return;
    if (!confirm('Really restore? Last chance to cancel.')) return;
    try {
      const data = JSON.parse(snap.payload);
      onRestore(normalizeState(data));
      toast(`Restored to ${fmtDate(snap.date)}`);
      onClose();
    } catch (e) { toast('Restore failed — snapshot corrupted'); }
  };

  return (
    <Modal open={open} onClose={onClose} title="Daily Snapshots — In-app history"
           footer={<button onClick={onClose} className="btn btn-ghost">Close</button>}>
      {snaps.length === 0 ? (
        <p className="text-mute italic text-sm py-6 text-center">
          No snapshots yet. One is taken automatically each day on the first save.
        </p>
      ) : (
        <>
          <p className="text-xs text-mute italic mb-3">
            Snapshots are stored on this device. Most recent {SNAPSHOT_LIMIT} days are kept; pinned snapshots are kept indefinitely.
          </p>
          <table className="ledger">
            <thead>
              <tr>
                <th>Date</th>
                <th style={{textAlign:'right'}}>Vouchers</th>
                <th style={{textAlign:'right'}}>Sales</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              {snaps.map(s => (
                <tr key={s.date}>
                  <td>
                    <span className="num">{fmtDate(s.date)}</span>
                    {s.pinned && <span className="chip ml-2" title="Pinned"
                      style={{ background: 'rgba(160,122,42,0.18)', color: '#7a5a1a' }}>★ pinned</span>}
                  </td>
                  <td className="num text-right">{s.voucherCount}</td>
                  <td className="num text-right">₹ {inr(s.totalSales)}</td>
                  <td className="text-right whitespace-nowrap">
                    <button className="btn btn-ghost text-[10px] px-2 py-0.5 mr-1" onClick={() => handleView(s)}>View</button>
                    <button className="btn btn-ghost text-[10px] px-2 py-0.5 mr-1" onClick={() => handleDownload(s)}>⬇</button>
                    <button className="btn btn-ghost text-[10px] px-2 py-0.5 mr-1" onClick={() => handlePin(s.date, !s.pinned)}>{s.pinned ? '☆' : '★'}</button>
                    <button className="btn btn-ghost text-[10px] px-2 py-0.5 mr-1" onClick={() => handleRestore(s)}>Restore</button>
                    <button className="btn btn-danger text-[10px] px-2 py-0.5" onClick={() => handleDelete(s.date)}>×</button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </>
      )}
    </Modal>
  );
}

        <div className="border-b border-rule2 px-5 py-3 flex items-center justify-between" style={{ background: 'rgba(160,122,42,0.10)' }}>
          <div className="flex items-center gap-3">
            <span className="chip" style={{ background: 'rgba(160,122,42,0.25)', color: '#7a5a1a', fontWeight: 600 }}>
              READ-ONLY · SNAPSHOT
            </span>
            <span className="display text-lg">Books as on {fmtDate(snapshotDate)}</span>
          </div>
          <div className="flex items-center gap-2">
            {['REPORTS','MASTERS'].map(k => (
              <button key={k} onClick={() => setScr(k)}
                      className={`btn ${scr === k ? 'btn-primary' : 'btn-ghost'} text-xs`}>
                {k === 'REPORTS' ? 'Reports' : 'Masters'}
              </button>
            ))}
            <button onClick={onClose} className="btn btn-ghost text-xs">Close ✕</button>
          </div>
        </div>
        <div className="flex-1 overflow-auto px-6 py-5">
          {scr === 'REPORTS' && <ReportsScreen state={snapshot} />}
          {scr === 'MASTERS' && <MastersScreen state={snapshot} setState={() => {}} toast={() => {}} />}
        </div>
      </div>
    </div>
  );
}

// ──────────────────────────────────────────────────────────────────────────
// APP SHELL
// ──────────────────────────────────────────────────────────────────────────

function App() {
  const [state, setStateRaw] = useState(loadStateLocal);
  const [screen, setScreen] = useState('SALES');
  const [toastMsg, setToastMsg] = useState('');
  const [receiptPrefill, setReceiptPrefill] = useState(null);
  const [showSettings, setShowSettings] = useState(false);
  const [showBackups, setShowBackups] = useState(false);
  const [viewingSnap, setViewingSnap] = useState(null); // { snapshot, date }

  // Auth: 'loading' | 'login' | 'ready' | 'local-fallback'
  const [authPhase, setAuthPhase] = useState(() => cloudReady() ? 'loading' : 'local-fallback');
  const [user, setUser] = useState(null);

  // Sync: 'idle' | 'syncing' | 'offline' | 'error' | 'local'
  const [syncStatus, setSyncStatus] = useState(cloudReady() ? 'syncing' : 'local');
  const [lastSyncAt, setLastSyncAt] = useState(0);
  const [autoDownload, setAutoDownload] = useState(() => localStorage.getItem(AUTO_DL_PREF_KEY) === '1');

  const debounceRef = useRef(null);
  const lastWrittenPayloadRef = useRef(null);  // Last payload we wrote to Firestore
  const lastReceivedPayloadRef = useRef(null); // Last payload received from listener
  const initializedRef = useRef(false);

  const toast = useCallback((m) => setToastMsg(m), []);

  // ── Auth listener ────────────────────────────────────────────────────────
  useEffect(() => {
    if (!cloudReady()) return;
    const unsub = fbAuth().onAuthStateChanged((u) => {
      setUser(u);
      setAuthPhase(u ? 'ready' : 'login');
    }, (err) => {
      console.error('Auth listener error:', err);
      setAuthPhase('local-fallback');
    });
    return unsub;
  }, []);

  // ── Firestore real-time subscription ─────────────────────────────────────
  useEffect(() => {
    if (!cloudReady() || !user) return;
    const ref = fbDB().doc(FIRESTORE_DOC_PATH);

    const unsub = ref.onSnapshot(
      (snap) => {
        const fromCache = snap.metadata && snap.metadata.fromCache;
        if (snap.exists) {
          const data = snap.data();
          const payload = data && data.payload;
          if (payload) {
            // Skip if it's our own write echoing back
            if (lastWrittenPayloadRef.current === payload) {
              setSyncStatus(fromCache ? 'offline' : 'idle');
              setLastSyncAt(Date.now());
              initializedRef.current = true;
              return;
            }
            // Skip if identical to what we already have
            if (lastReceivedPayloadRef.current === payload) {
              setSyncStatus(fromCache ? 'offline' : 'idle');
              return;
            }
            try {
              const remote = normalizeState(JSON.parse(payload));
              lastReceivedPayloadRef.current = payload;
              setStateRaw(remote);
              saveStateLocal(remote);
              captureSnapshotIfNeeded(remote);
              if (!initializedRef.current) {
                triggerDailyAutoDownload(remote);
                initializedRef.current = true;
              }
            } catch (e) {
              console.error('Failed to parse Firestore payload', e);
            }
          }
        } else {
          // First time — push current local state to seed Firestore
          if (!initializedRef.current) {
            const seed = JSON.stringify(state);
            ref.set({
              payload: seed,
              updatedAt: fbNS().firestore.FieldValue.serverTimestamp(),
              updatedBy: user.email || 'unknown',
              version: 1,
            }).then(() => {
              lastWrittenPayloadRef.current = seed;
              initializedRef.current = true;
            }).catch(err => console.error('Seed write failed:', err));
          }
        }
        setSyncStatus(fromCache ? 'offline' : 'idle');
        setLastSyncAt(Date.now());
      },
      (err) => {
        console.error('Firestore listen error:', err);
        setSyncStatus('error');
      }
    );
    return unsub;
  }, [user]); // eslint-disable-line

  // ── setState — write-through to local + (debounced) Firestore ────────────
  const setState = useCallback((s) => {
    setStateRaw(prev => {
      const next = typeof s === 'function' ? s(prev) : s;
      // Mirror to localStorage immediately (instant cache, offline survival)
      saveStateLocal(next);
      // Capture daily snapshot if it's a new day
      captureSnapshotIfNeeded(next);

      if (cloudReady() && user) {
        setSyncStatus('syncing');
        if (debounceRef.current) clearTimeout(debounceRef.current);
        debounceRef.current = setTimeout(() => {
          const payload = JSON.stringify(next);
          // Avoid no-op writes
          if (lastWrittenPayloadRef.current === payload) {
            setSyncStatus('idle');
            return;
          }
          fbDB().doc(FIRESTORE_DOC_PATH).set({
            payload,
            updatedAt: fbNS().firestore.FieldValue.serverTimestamp(),
            updatedBy: (user && user.email) || 'unknown',
            version: 1,
          }).then(() => {
            lastWrittenPayloadRef.current = payload;
            setSyncStatus('idle');
            setLastSyncAt(Date.now());
          }).catch(err => {
            console.error('Firestore write failed:', err);
            setSyncStatus('error');
          });
        }, 500);
      }
      return next;
    });
  }, [user]);

  // ── F-key navigation, global ─────────────────────────────────────────────
  useEffect(() => {
    const onKey = (e) => {
      const fkeys = { 'F1': 'PURCHASES', 'F2': 'SALES', 'F3': 'PAYMENT', 'F4': 'RECEIPT', 'F5': 'JOURNAL', 'F6': 'REPORTS', 'F7': 'MASTERS' };
      if (fkeys[e.key]) {
        e.preventDefault();
        if (authPhase === 'login' || authPhase === 'loading') return;
        if (viewingSnap) return;
        setScreen(fkeys[e.key]);
        if (fkeys[e.key] !== 'RECEIPT') setReceiptPrefill(null);
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [authPhase, viewingSnap]);

  const switchScreen = (key) => {
    setScreen(key);
    if (key !== 'RECEIPT') setReceiptPrefill(null);
  };

  const gotoReceipt = (salesVoucher) => {
    setReceiptPrefill(salesVoucher);
    setScreen('RECEIPT');
  };

  const exportData = () => {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `bikecare-erp-${todayISO()}.json`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    toast('Exported');
  };

  const importData = (file) => {
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = normalizeState(JSON.parse(reader.result));
        setState(data);
        toast('Data imported');
      } catch (e) { toast('Invalid file'); }
    };
    reader.readAsText(file);
  };

  const wipeAll = () => {
    if (!confirm('This will erase ALL data — local AND in the cloud. Are you sure?')) return;
    if (!confirm('Really erase everything? This cannot be undone.')) return;
    const fresh = initialState();
    localStorage.removeItem(STORAGE_KEY);
    setStateRaw(fresh);
    saveStateLocal(fresh);
    if (cloudReady() && user) {
      const payload = JSON.stringify(fresh);
      fbDB().doc(FIRESTORE_DOC_PATH).set({
        payload,
        updatedAt: fbNS().firestore.FieldValue.serverTimestamp(),
        updatedBy: (user && user.email) || 'unknown',
        version: 1,
      }).then(() => { lastWrittenPayloadRef.current = payload; }).catch(console.error);
    }
    toast('All data erased');
  };

  const restoreFromSnapshot = (snapState) => {
    setState(snapState);
  };

  const handleAutoDownloadToggle = (e) => {
    const on = e.target.checked;
    setAutoDownload(on);
    localStorage.setItem(AUTO_DL_PREF_KEY, on ? '1' : '0');
    if (on) toast('Daily auto-download enabled — first download tomorrow');
  };

  const handleSignOut = async () => {
    if (!confirm('Sign out of Bike Care on this device?')) return;
    try {
      await fbAuth().signOut();
      // localStorage stays so re-sign-in is instant
      setShowSettings(false);
      toast('Signed out');
    } catch (e) { toast('Sign out failed'); }
  };

  // ── Top stats for the chrome ─────────────────────────────────────────────
  const cashBal = useMemo(() => {
    let s = 0;
    state.ledgers.filter(l => l.groupId === 'g_cash').forEach(l => {
      const b = ledgerBalance(state, l.id);
      s += b.side === 'dr' ? b.amount : -b.amount;
    });
    return s;
  }, [state]);

  const todaySales = useMemo(() => {
    const t = todayISO();
    return state.vouchers.filter(v => v.type === 'sales' && v.date === t).reduce((s, v) => s + (v.grand || 0), 0);
  }, [state.vouchers]);

  // ── Render: auth gate ────────────────────────────────────────────────────
  if (authPhase === 'loading') {
    return (
      <div className="min-h-screen flex items-center justify-center">
        <div className="text-center">
          <div className="seal text-base mx-auto mb-4">BC</div>
          <div className="display text-xl text-wax italic">Bike Care</div>
          <div className="smcap text-mute mt-1">Connecting to cloud…</div>
        </div>
      </div>
    );
  }
  if (authPhase === 'login') {
    return <LoginScreen />;
  }
  // 'ready' or 'local-fallback' — render the app

  // ── Render: main app ─────────────────────────────────────────────────────
  return (
    <div className="min-h-screen flex flex-col">
      {/* Top Chrome */}
      <header className="bg-paper border-b border-rule2 px-6 py-3 flex items-center justify-between no-print">
        <div className="flex items-center gap-4">
          <div className="seal text-sm">BC</div>
          <div>
            <h1 className="display text-xl leading-none">{state.meta.businessName}</h1>
            <div className="text-xs text-mute italic mt-0.5">Since {state.meta.since} · {fmtDate(todayISO())}</div>
          </div>
        </div>
        <div className="flex items-center gap-6">
          <div className="text-right">
            <div className="smcap text-mute text-[10px]">Today's Sales</div>
            <div className="num text-sm font-semibold">₹ {inr(todaySales)}</div>
          </div>
          <div className="text-right">
            <div className="smcap text-mute text-[10px]">Cash on Hand</div>
            <div className="num text-sm font-semibold">₹ {inr(cashBal)}</div>
          </div>
          <button onClick={() => setShowSettings(true)} className="btn btn-ghost text-xs">Data ⚙</button>
        </div>
      </header>

      {/* Main */}
      <div className="flex flex-1 min-h-0">
        <main className="flex-1 px-8 py-6 overflow-auto">
          {screen === 'PURCHASES' && <PurchasesScreen state={state} setState={setState} toast={toast} />}
          {screen === 'SALES'     && <SalesScreen     state={state} setState={setState} toast={toast} gotoReceipt={gotoReceipt} />}
          {screen === 'PAYMENT'   && <PaymentReceiptScreen state={state} setState={setState} toast={toast} mode="PAYMENT" />}
          {screen === 'RECEIPT'   && <PaymentReceiptScreen state={state} setState={setState} toast={toast} mode="RECEIPT" prefill={receiptPrefill} />}
          {screen === 'JOURNAL'   && <JournalScreen   state={state} setState={setState} toast={toast} />}
          {screen === 'REPORTS'   && <ReportsScreen   state={state} />}
          {screen === 'MASTERS'   && <MastersScreen   state={state} setState={setState} toast={toast} />}
        </main>

        <HotKeysSidebar active={screen} onSwitch={switchScreen} />
      </div>

      {/* Footer */}
      <footer className="border-t border-rule2 bg-paper2/30 px-6 py-2 flex justify-between items-center text-xs text-mute no-print">
        <div className="flex items-center gap-3">
          <span className="key">F1</span><span>Purchases</span>
          <span className="key">F2</span><span>Sales</span>
          <span className="key">F3</span><span>Payment</span>
          <span className="key">F4</span><span>Receipt</span>
          <span className="key">F5</span><span>Journal</span>
          <span className="key">F6</span><span>Reports</span>
          <span className="key">F7</span><span>Masters</span>
        </div>
        <div className="flex items-center gap-3">
          <span>{state.vouchers.length} vouchers · {state.ledgers.length} ledgers · {state.items.length} items</span>
          <span className="text-rule2">·</span>
          <SyncStatusPill status={syncStatus} lastSyncAt={lastSyncAt} />
          <span className="text-rule2">·</span>
          <span className="italic text-[10px]">v1.0</span>
        </div>
      </footer>

      {/* Settings */}
      <Modal open={showSettings} onClose={() => setShowSettings(false)} title="Data & Settings"
             footer={<button onClick={() => setShowSettings(false)} className="btn btn-ghost">Done</button>}>
        <div className="space-y-5">
          {/* Account */}
          {cloudReady() && user && (
            <div>
              <div className="smcap text-mute mb-2">Account</div>
              <div className="flex items-center justify-between text-sm">
                <div>
                  <div className="font-medium">{user.email}</div>
                  <div className="text-xs text-mute italic">Signed in · session persists on this device</div>
                </div>
                <button onClick={handleSignOut} className="btn btn-ghost text-xs">Sign Out</button>
              </div>
            </div>
          )}
          {!cloudReady() && (
            <div className="bg-paper2/50 border border-rule2 rounded p-3 text-xs text-mute">
              <div className="font-semibold text-ink mb-1">⚠ Cloud sync unavailable</div>
              Firebase didn't load — likely a network or CDN issue. The app is running on local storage only. Reload when you're back online.
            </div>
          )}

          <div className="border-t border-rule pt-4">
            <div className="smcap text-mute mb-2">Business</div>
            <div className="space-y-3">
              <div>
                <label className="smcap text-mute block mb-1">Business Name</label>
                <input className="w-full" value={state.meta.businessName} onChange={(e) => setState({ ...state, meta: { ...state.meta, businessName: e.target.value } })} />
              </div>
              <div className="grid grid-cols-2 gap-3">
                <div>
                  <label className="smcap text-mute block mb-1">Since</label>
                  <input className="w-full" value={state.meta.since} onChange={(e) => setState({ ...state, meta: { ...state.meta, since: e.target.value } })} />
                </div>
                <div>
                  <label className="smcap text-mute block mb-1">FY Start</label>
                  <input type="date" className="w-full" value={state.meta.fyStart} onChange={(e) => setState({ ...state, meta: { ...state.meta, fyStart: e.target.value } })} />
                </div>
              </div>
            </div>
          </div>

          <div className="border-t border-rule pt-4">
            <div className="smcap text-mute mb-2">Backup & Restore</div>
            <div className="flex gap-2 flex-wrap">
              <button onClick={() => setShowBackups(true)} className="btn btn-ghost">📚 Daily Snapshots ({loadSnapshots().length})</button>
              <button onClick={exportData} className="btn btn-ghost">⬇ Export JSON</button>
              <label className="btn btn-ghost cursor-pointer">
                ⬆ Import JSON
                <input type="file" accept=".json" className="hidden" onChange={(e) => e.target.files[0] && importData(e.target.files[0])} />
              </label>
              <button onClick={wipeAll} className="btn btn-danger">Erase All Data</button>
            </div>
            <label className="flex items-start gap-2 mt-4 cursor-pointer text-xs">
              <input type="checkbox" checked={autoDownload} onChange={handleAutoDownloadToggle}
                     style={{ width: 'auto', marginTop: 2 }} />
              <span>
                <span className="font-medium not-italic">Auto-download a JSON backup once per day</span>
                <span className="block text-mute italic mt-0.5">
                  On first app open each day, the browser silently saves a dated JSON to your Downloads folder. Filesystem failsafe in case both cloud and browser cache fail.
                </span>
              </span>
            </label>
            <p className="text-xs text-mute italic mt-3 leading-relaxed">
              {cloudReady()
                ? 'Data syncs to Firebase across all your devices. localStorage on each device acts as an instant cache and works offline. Daily snapshots give you a 30-day in-app history.'
                : 'Data lives in your browser\'s local storage only. Cloud sync is unavailable right now.'}
            </p>
          </div>
        </div>
      </Modal>

      {/* Backups (Daily Snapshots) */}
      <BackupsModal
        open={showBackups}
        onClose={() => setShowBackups(false)}
        onView={(snap, date) => { setShowBackups(false); setViewingSnap({ snap, date }); }}
        onRestore={restoreFromSnapshot}
        toast={toast}
      />

      {/* Read-only snapshot viewer */}
      {viewingSnap && (
        <SnapshotViewer
          snapshot={viewingSnap.snap}
          snapshotDate={viewingSnap.date}
          onClose={() => setViewingSnap(null)}
        />
      )}

      <Toast msg={toastMsg} onDone={() => setToastMsg('')} />
    </div>
  );
}

try {
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
} catch (err) {
  document.getElementById('root').innerHTML =
    '<div style="padding:32px;font-family:system-ui;color:#1b1c22;max-width:640px;margin:40px auto;background:#f5efe1;border:1px solid #c2b791;border-radius:4px"><h2 style="font-family:Fraunces,serif;margin:0 0 12px;color:#7a1f2b">App failed to load</h2><p>One of the script CDNs may be blocked. Try a different network or browser. Error: <code>' + (err && err.message ? err.message : err) + '</code></p></div>';
  console.error('Bike Care ERP failed to mount:', err);
}
</script>
</body>
</html>
