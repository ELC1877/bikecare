// Date helpers — anchored to IST (Asia/Kolkata) so a 1 AM voucher in India
// stays on the calendar day the user expects, never UTC-shifted to "yesterday".
const todayISO = () => {
  // 'en-CA' returns YYYY-MM-DD which matches our internal ISO format.
  return new Date().toLocaleDateString('en-CA', { timeZone: 'Asia/Kolkata' });
};
const fmtDate = (iso) => {
  if (!iso) return '';
  const [y,m,d] = iso.split('-');
  return `${d}/${m}/${y}`;
};
const fmtDateLong = (iso) => {
  if (!iso) return '';
  const [y,m,d] = iso.split('-');
  const dt = new Date(Date.UTC(Number(y), Number(m)-1, Number(d)));
  // Render as e.g. "Wednesday, 29 April 2026" in IST
  return dt.toLocaleDateString('en-IN', { timeZone: 'Asia/Kolkata', weekday: 'long', day: '2-digit', month: 'long', year: 'numeric' });
};
const inr = (n) => {
  const num = Number(n) || 0;
  const sign = num < 0 ? '-' : '';
  const abs = Math.abs(num);
  // Indian numbering with 2dp
  const s = abs.toFixed(2);
  const [intP, decP] = s.split('.');
  const last3 = intP.slice(-3);
  const rest = intP.slice(0, -3);
  const restF = rest.replace(/\B(?=(\d{2})+(?!\d))/g, ',');
  return sign + (rest ? restF + ',' + last3 : last3) + '.' + decP;
};
const uid = (prefix) => `${prefix}_${Date.now().toString(36)}_${Math.random().toString(36).slice(2,8)}`;

const SNAPSHOT_KEY      = 'bikecare_erp_v1_snaps';
const LAST_DOWNLOAD_KEY = 'bikecare_erp_v1_lastDl';
const AUTO_DL_PREF_KEY  = 'bikecare_erp_v1_autoDl';
const SNAPSHOT_LIMIT    = 30; // keep 30 most recent days, plus pinned

const initialState = () => ({
  meta: {
    businessName: BUSINESS_NAME,        // sourced from the code-permanent constant
    fyStart: `${new Date().getFullYear()}-04-01`,
  },
  groups: DEFAULT_GROUPS,
  ledgers: DEFAULT_LEDGERS,
  units: DEFAULT_UNITS,
  superCategories: [],
  subCategories: [],
  items: [],
  vouchers: [],
  ledgerEntries: [],
  stockEntries: [],
  counters: { sales: 1, purchase: 1, payment: 1, receipt: 1, journal: 1 },
});

const normalizeState = (parsed) => {
  const base = initialState();
  const merged = {
    ...base,
    ...(parsed || {}),
    groups: parsed && parsed.groups && parsed.groups.length === 19 ? parsed.groups : DEFAULT_GROUPS,
  };
  // Force businessName to the code constant — it is intentionally not editable
  // from the UI. To rename for another business, edit BUSINESS_NAME in source.
  merged.meta = { ...(parsed?.meta || {}), ...base.meta, businessName: BUSINESS_NAME };
  // Drop the legacy 'since' field if present in old saved data
  if (merged.meta.since) delete merged.meta.since;
  return merged;
};

// — localStorage mirror (Tier 2: instant first paint + offline) —
const loadStateLocal = () => {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return initialState();
    return normalizeState(JSON.parse(raw));
  } catch (e) {
    console.error('Local load failed', e);
    return initialState();
  }
};
const saveStateLocal = (s) => {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch (e) { console.error(e); }
};

// — daily snapshots ring buffer (Tier 3: in-app history) —
const loadSnapshots = () => {
  try {
    const raw = localStorage.getItem(SNAPSHOT_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch (e) { return []; }
};
const saveSnapshots = (arr) => {
  try { localStorage.setItem(SNAPSHOT_KEY, JSON.stringify(arr)); } catch (e) { console.error(e); }
};
const captureSnapshotIfNeeded = (s) => {
  try {
    const today = todayISO();
    const snaps = loadSnapshots();
    const idx = snaps.findIndex(x => x.date === today);
    const sales = (s.vouchers || []).filter(v => v.type === 'sales');
    const meta = {
      date: today,
      voucherCount: (s.vouchers || []).length,
      salesCount: sales.length,
      totalSales: sales.reduce((sum, v) => sum + (Number(v.grand) || 0), 0),
      capturedAt: Date.now(),
      pinned: idx >= 0 ? !!snaps[idx].pinned : false,
      payload: JSON.stringify(s),
    };
    if (idx >= 0) snaps[idx] = meta; else snaps.push(meta);
    // Keep most recent SNAPSHOT_LIMIT, plus any pinned, plus today's
    const sorted = snaps.sort((a, b) => b.date.localeCompare(a.date));
    const trimmed = sorted.filter((x, i) => x.pinned || x.date === today || i < SNAPSHOT_LIMIT);
    saveSnapshots(trimmed);
  } catch (e) { console.error('Snapshot capture failed', e); }
};
const pinSnapshot = (date, pin) => {
  const snaps = loadSnapshots();
  const idx = snaps.findIndex(x => x.date === date);
  if (idx >= 0) { snaps[idx].pinned = !!pin; saveSnapshots(snaps); }
};
const deleteSnapshot = (date) => {
  saveSnapshots(loadSnapshots().filter(x => x.date !== date));
};

// — daily auto-download (Tier 4: optional filesystem failsafe) —
const triggerDailyAutoDownload = (s) => {
  try {
    if (localStorage.getItem(AUTO_DL_PREF_KEY) !== '1') return;
    const today = todayISO();
    if (localStorage.getItem(LAST_DOWNLOAD_KEY) === today) return;
    const blob = new Blob([JSON.stringify(s, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `bikecare-erp-${today}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    localStorage.setItem(LAST_DOWNLOAD_KEY, today);
  } catch (e) { console.error('Auto-download failed', e); }
};

// Compute balance for a single ledger as of optional date (inclusive)
// Returns positive number with separate 'side' indicating Dr or Cr balance
function ledgerBalance(state, ledgerId, asOfDate) {
  const ledger = state.ledgers.find(l => l.id === ledgerId);
  if (!ledger) return { amount: 0, side: 'dr' };
  const group = state.groups.find(g => g.id === ledger.groupId);
  const naturalDr = group && (group.nature === 'asset' || group.nature === 'expense');
  let dr = 0, cr = 0;
  // Opening balance: assets/expenses are normally debit; liabilities/income normally credit
  if (ledger.openingBalance) {
    if (naturalDr) dr += Number(ledger.openingBalance) || 0;
    else cr += Number(ledger.openingBalance) || 0;
  }
  state.ledgerEntries.forEach(e => {
    if (e.ledgerId !== ledgerId) return;
    if (asOfDate && e.date > asOfDate) return;
    dr += Number(e.dr) || 0;
    cr += Number(e.cr) || 0;
  });
  const net = dr - cr;
  return { amount: Math.abs(net), side: net >= 0 ? 'dr' : 'cr', dr, cr };
}

// Stock balance for an item
function stockBalance(state, itemId, asOfDate) {
  const item = state.items.find(i => i.id === itemId);
  if (!item) return 0;
  let bal = Number(item.openingBalance) || 0;
  state.stockEntries.forEach(e => {
    if (e.itemId !== itemId) return;
    if (asOfDate && e.date > asOfDate) return;
    bal += (Number(e.in) || 0) - (Number(e.out) || 0);
  });
  return bal;
}

// Find or create a customer/vendor ledger by name
function findOrCreateParty(state, name, groupId) {
  const trimmed = (name || '').trim();
  if (!trimmed) return null;
  const existing = state.ledgers.find(l => l.name.toLowerCase() === trimmed.toLowerCase());
  if (existing) return existing;
  const newL = { id: uid('l'), name: trimmed, groupId, openingBalance: 0, contact: '', address: '', vehicle: '' };
  state.ledgers.push(newL);
  return newL;
}

// Autocomplete picker — supports keyboard nav, fast filter, "create new" inline.
//
// V2.2 FIX — "Pick an item from the dropdown" race:
// Earlier versions only auto-picked exact-match typed text on blur / Enter / Tab.
// In React 18 those state updates are batched, so when the user typed an item
// name and clicked Save Voucher, the order was:
//   1. blur fires → tryAutoPickExact → setLines QUEUED (not flushed)
//   2. click fires → save() runs synchronously with STALE lines (itemId = '')
//   3. validation fails → toast "Pick an item from the dropdown — typing alone is not enough"
//   4. React finally flushes the queued setLines, but the toast already fired.
// Three previous patches all stayed on the wrong side of this race because they
// hooked into blur / keydown — every one of which loses to the click handler.
// The real fix is to push the autopick UP into the keystroke handler, so by the
// time the user releases the last key the parent's lines[i].itemId is already set
// and there is nothing left to flush when click arrives.
function Picker({ value, onChange, onTextChange, options, placeholder = '', getLabel = (o) => o.name, getMeta, allowCreate = false, onCreate, autoFocus, className = '' }) {
  const [open, setOpen] = useState(false);
  const [query, setQuery] = useState(value ? getLabel(options.find(o => o.id === value) || { name: '' }) : '');
  const [active, setActive] = useState(0);
  const ref = useRef(null);

  useEffect(() => {
    const o = options.find(o => o.id === value);
    setQuery(o ? getLabel(o) : (value ? value : ''));
  }, [value, options.length]);

  const filtered = useMemo(() => {
    const q = query.toLowerCase().trim();
    if (!q) return options.slice(0, 50);
    return options.filter(o => getLabel(o).toLowerCase().includes(q)).slice(0, 50);
  }, [query, options]);

  const pick = (opt) => {
    onChange(opt.id, opt);
    setQuery(getLabel(opt));
    setOpen(false);
  };
  const createNew = () => {
    if (!query.trim() || !onCreate) return;
    const created = onCreate(query.trim());
    if (created) {
      onChange(created.id, created);
      setQuery(getLabel(created));
    }
    setOpen(false);
  };
  // Auto-select when the typed query exactly matches an option (case-insensitive, trimmed).
  // Fixes the case where a user types the full item name and tabs/clicks away without
  // explicitly mousing-down on a suggestion row.  Safe — only fires on exact matches.
  const tryAutoPickExact = () => {
    const q = query.toLowerCase().trim();
    if (!q) return false;
    const exact = options.find(o => getLabel(o).toLowerCase().trim() === q);
    if (exact && exact.id !== value) {
      onChange(exact.id, exact);
      setQuery(getLabel(exact));
      return true;
    }
    return false;
  };
  const onKey = (e) => {
    if (e.key === 'ArrowDown') { e.preventDefault(); setActive(a => Math.min(a + 1, filtered.length - (allowCreate ? 0 : 1))); setOpen(true); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); setActive(a => Math.max(a - 1, 0)); }
    else if (e.key === 'Enter') {
      e.preventDefault();
      if (open && active < filtered.length) pick(filtered[active]);
      else if (allowCreate && query.trim()) createNew();
      else tryAutoPickExact();
    } else if (e.key === 'Tab') {
      // Tab moves focus to the next field — pick the highlighted suggestion if dropdown
      // is open, else fall back to an exact-match auto-pick.  Don't preventDefault — let
      // browser focus move naturally.
      if (open && active >= 0 && active < filtered.length) {
        pick(filtered[active]);
      } else {
        tryAutoPickExact();
      }
      setOpen(false);
    } else if (e.key === 'Escape') {
      setOpen(false);
    }
  };

  // Keystroke-time handler. Does THREE things in one pass so the parent is
  // always in sync with what's visible in the input:
  //   (a) update local query
  //   (b) if typed text exactly matches an option, push that selection to the
  //       parent IMMEDIATELY (this is what kills the blur-vs-click race)
  //   (c) if typed text doesn't match anything but the parent currently holds
  //       a value, clear that value — for allowCreate pickers we still tell
  //       the parent the typed text via onTextChange so customer/vendor names
  //       survive into save()
  const handleInput = (v) => {
    setQuery(v);
    setOpen(true);
    setActive(0);
    const trimmed = v.trim().toLowerCase();
    const exact = trimmed ? options.find(o => getLabel(o).toLowerCase().trim() === trimmed) : null;
    if (exact) {
      if (exact.id !== value) onChange(exact.id, exact);
    } else {
      if (value) onChange('', null);
      if (onTextChange) onTextChange(v);
    }
  };

  return (
    <div className={`relative ${className}`} ref={ref}>
      <input
        value={query}
        autoFocus={autoFocus}
        onChange={(e) => handleInput(e.target.value)}
        onFocus={() => setOpen(true)}
        onBlur={() => { tryAutoPickExact(); setTimeout(() => setOpen(false), 150); }}
        onKeyDown={onKey}
        placeholder={placeholder}
        className="w-full"
      />
      {open && (
        <div className="suggest">
          {filtered.length === 0 && !allowCreate && (
            <div className="suggest-item text-mute italic">No matches</div>
          )}
          {filtered.map((o, i) => (
            <div key={o.id} className={`suggest-item ${i === active ? 'active' : ''}`}
                 onMouseDown={() => pick(o)} onMouseEnter={() => setActive(i)}>
              <div className="font-medium">{getLabel(o)}</div>
              {getMeta && <div className="meta">{getMeta(o)}</div>}
            </div>
          ))}
          {allowCreate && query.trim() && !filtered.find(o => getLabel(o).toLowerCase() === query.toLowerCase().trim()) && (
            <div className={`suggest-item ${active === filtered.length ? 'active' : ''}`}
                 onMouseDown={createNew}
                 onMouseEnter={() => setActive(filtered.length)}>
              <span className="text-wax font-medium">+ Create</span> "{query.trim()}"
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function Modal({ open, onClose, title, children, footer }) {
  useEffect(() => {
    if (!open) return;
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [open, onClose]);
  if (!open) return null;
  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal-card" onClick={(e) => e.stopPropagation()}>
        <div className="px-6 pt-5 pb-3 border-b border-rule flex items-start justify-between">
          <h3 className="display text-2xl">{title}</h3>
          <button onClick={onClose} className="text-mute hover:text-ink text-xl leading-none">×</button>
        </div>
        <div className="px-6 py-4">{children}</div>
        {footer && <div className="px-6 py-4 border-t border-rule flex justify-end gap-2 bg-paper2/40">{footer}</div>}
      </div>
    </div>
  );
}

function Toast({ msg, onDone }) {
  useEffect(() => {
    if (!msg) return;
    const t = setTimeout(onDone, 2400);
    return () => clearTimeout(t);
  }, [msg]);
  if (!msg) return null;
  return (
    <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-[200] bg-ink text-paper px-5 py-3 rounded-sm shadow-lg text-sm font-medium animate-fadein">
      {msg}
    </div>
  );
}

function SalesScreen({ state, setState, toast, gotoReceipt }) {
  const next = state.counters.sales;
  const [date, setDate] = useState(todayISO());
  const [customerId, setCustomerId] = useState('');
  const [customerName, setCustomerName] = useState('');
  const [address, setAddress] = useState('');
  const [contact, setContact] = useState('');
  const [vehicle, setVehicle] = useState('');
  const [lines, setLines] = useState([{ id: uid('ln'), itemId: '', qty: '', rate: '' }]);
  const [otherCharges, setOtherCharges] = useState([]); // [{ledgerId, amount}]
  const [narration, setNarration] = useState('');
  const [savedVoucher, setSavedVoucher] = useState(null);

  // Customer picker: Sundry Debtors (credit customer) + Cash in Hand + Bank Accounts only.
  const customers = useMemo(() =>
    state.ledgers.filter(l => CUSTOMER_GROUPS.includes(l.groupId)),
    [state.ledgers]);

  // Other-charge picker: Direct Income (preferred), other income, duties — NOT Current Liabilities.
  const otherChargeLedgers = useMemo(() => state.ledgers.filter(l => {
    const g = state.groups.find(x => x.id === l.groupId);
    return g && (g.nature === 'income' || g.id === 'g_duties');
  }), [state.ledgers, state.groups]);

  const total = useMemo(() => lines.reduce((s, l) => s + (Number(l.qty) || 0) * (Number(l.rate) || 0), 0), [lines]);
  const charges = useMemo(() => otherCharges.reduce((s, c) => s + (Number(c.amount) || 0), 0), [otherCharges]);
  const grand = total + charges;

  // Functional setters — avoid stale-closure overwrites when several fields are edited rapidly.
  const addLine = () => setLines(prev => [...prev, { id: uid('ln'), itemId: '', qty: '', rate: '' }]);
  const updateLine = (id, patch) => setLines(prev => prev.map(l => l.id === id ? { ...l, ...patch } : l));
  const removeLine = (id) => setLines(prev => prev.length > 1 ? prev.filter(l => l.id !== id) : prev);

  const addCharge = () => setOtherCharges(prev => [...prev, { id: uid('ch'), ledgerId: '', amount: '' }]);
  const updateCharge = (id, patch) => setOtherCharges(prev => prev.map(c => c.id === id ? { ...c, ...patch } : c));
  const removeCharge = (id) => setOtherCharges(prev => prev.filter(c => c.id !== id));

  // Auto-fill customer details on selection
  useEffect(() => {
    if (!customerId) return;
    const c = state.ledgers.find(l => l.id === customerId);
    if (c) {
      setCustomerName(c.name);
      if (c.address) setAddress(c.address);
      if (c.contact) setContact(c.contact);
      if (c.vehicle) setVehicle(c.vehicle);
    }
  }, [customerId]);

  const reset = () => {
    setCustomerId(''); setCustomerName(''); setAddress(''); setContact(''); setVehicle('');
    setLines([{ id: uid('ln'), itemId: '', qty: '', rate: '' }]);
    setOtherCharges([]); setNarration('');
    setSavedVoucher(null);
    setDate(todayISO());
  };

  const save = () => {
    if (!customerName.trim()) { toast('Customer name required'); return; }

    // Build a clearer error if validation fails so it doesn't look like a glitch.
    const validLines = lines.filter(l => l.itemId && Number(l.qty) > 0);
    if (validLines.length === 0) {
      const hasItem = lines.some(l => l.itemId);
      const hasQty  = lines.some(l => Number(l.qty) > 0);
      if (!hasItem)        toast('Pick an item from the dropdown — typing alone is not enough');
      else if (!hasQty)    toast('Enter a quantity (> 0) for the item');
      else                 toast('Each item needs both a name and a quantity');
      return;
    }

    // Negative-stock guard — soft warning only, save still proceeds.
    const negList = validLines.filter(l => {
      const it = state.items.find(i => i.id === l.itemId);
      if (!it) return false;
      return Number(l.qty) > stockBalance(state, l.itemId);
    });

    const next = { ...state };
    // Find/create customer (creation defaults to Sundry Debtors for credit-tracked customers)
    let custLedger = state.ledgers.find(l => l.id === customerId);
    if (!custLedger) {
      custLedger = findOrCreateParty(next, customerName, 'g_sundry_dr');
    } else {
      // Update party details (only for non-system, non-cash/bank parties)
      const idx = next.ledgers.findIndex(l => l.id === custLedger.id);
      if (!custLedger.locked) {
        next.ledgers[idx] = { ...custLedger, address, contact, vehicle };
      }
    }

    const voucherId = uid('vch');
    const voucherNo = state.counters.sales;
    const voucher = {
      id: voucherId, type: 'sales', voucherNo, date,
      partyId: custLedger.id, partyName: customerName, address, contact, vehicle,
      lines: validLines.map(l => ({ ...l })),
      otherCharges: otherCharges.filter(c => c.ledgerId && Number(c.amount) > 0),
      total, charges, grand, narration,
      createdAt: Date.now(),
    };
    next.vouchers = [...next.vouchers, voucher];
    next.counters = { ...next.counters, sales: voucherNo + 1 };

    // Update items with last sale price
    validLines.forEach(l => {
      const i = next.items.findIndex(it => it.id === l.itemId);
      if (i >= 0) next.items[i] = { ...next.items[i], lastSalePrice: Number(l.rate) };
    });

    // Ledger entries: Dr Customer (or Cash/Bank), Cr Sales (+ Cr Other charge ledgers)
    const entries = [
      { id: uid('le'), voucherId, ledgerId: custLedger.id, dr: grand, cr: 0, date, narration: `Sales — ${customerName}` },
      { id: uid('le'), voucherId, ledgerId: 'l_sales',     dr: 0, cr: total, date, narration: `Sales — ${customerName}` },
    ];
    voucher.otherCharges.forEach(c => {
      entries.push({ id: uid('le'), voucherId, ledgerId: c.ledgerId, dr: 0, cr: Number(c.amount), date, narration: `Sales charges — ${customerName}` });
    });
    next.ledgerEntries = [...next.ledgerEntries, ...entries];

    // Stock entries (sales = OUT)
    const stockEntries = validLines.map(l => ({
      id: uid('se'), voucherId, itemId: l.itemId, in: 0, out: Number(l.qty), rate: Number(l.rate), date
    }));
    next.stockEntries = [...next.stockEntries, ...stockEntries];

    setState(next);
    setSavedVoucher(voucher);
    if (negList.length > 0) {
      const names = negList.map(l => state.items.find(i => i.id === l.itemId)?.name).filter(Boolean).join(', ');
      toast(`Sales #${voucherNo} saved · Warning: negative stock for ${names}`);
    } else {
      toast(`Sales #${voucherNo} saved`);
    }
  };

  if (savedVoucher) {
    return <VoucherSaved voucher={savedVoucher} state={state} onNew={reset} onPay={() => gotoReceipt(savedVoucher)} />;
  }

  return (
    <div>
      <ScreenHeader title="Sales" voucherNo={next} voucherDate={date} onDateChange={setDate} />

      <div className="grid grid-cols-2 gap-x-8 gap-y-3 mb-4">
        <div>
          <label className="smcap text-mute block mb-1">Customer's Name</label>
          <Picker
            value={customerId}
            onChange={(id, opt) => { setCustomerId(id); if (opt) setCustomerName(opt.name); }}
            onTextChange={setCustomerName}
            options={customers}
            placeholder="Type to search or create…"
            allowCreate
            onCreate={(name) => {
              const created = { id: uid('l'), name, groupId: 'g_sundry_dr', openingBalance: 0, contact: '', address: '', vehicle: '' };
              setState(prev => ({ ...prev, ledgers: [...prev.ledgers, created] }));
              setCustomerName(name);
              return created;
            }}
            getMeta={(o) => {
              const g = state.groups.find(gr => gr.id === o.groupId);
              const tag = g ? g.name : '';
              const ext = o.contact || o.address || '';
              return ext ? `${tag} · ${ext}` : tag;
            }}
            autoFocus
          />

        </div>
        <div>
          <label className="smcap text-mute block mb-1">Contact</label>
          <input value={contact} onChange={(e) => setContact(e.target.value)} className="w-full" placeholder="Phone" />
        </div>
        <div>
          <label className="smcap text-mute block mb-1">Address</label>
          <input value={address} onChange={(e) => setAddress(e.target.value)} className="w-full" placeholder="Address" />
        </div>
        <div>
          <label className="smcap text-mute block mb-1">Vehicle No.</label>
          <input value={vehicle} onChange={(e) => setVehicle(e.target.value)} className="w-full" placeholder="Optional" />
        </div>
      </div>

      <div className="rule mb-4"></div>

      <table className="ledger mb-4">
        <thead>
          <tr>
            <th style={{ width: '50%' }}>Item</th>
            <th style={{ width: '14%', textAlign: 'right' }}>Qty</th>
            <th style={{ width: '8%' }}>Unit</th>
            <th style={{ width: '14%', textAlign: 'right' }}>Rate</th>
            <th style={{ width: '14%', textAlign: 'right' }}>Total</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          {lines.map((l, idx) => {
            const item = state.items.find(i => i.id === l.itemId);
            const unit = item ? state.units.find(u => u.id === item.unitId) : null;
            const lineTotal = (Number(l.qty) || 0) * (Number(l.rate) || 0);
            const stock = item ? stockBalance(state, item.id) : null;
            const wouldBeNegative = item && (Number(l.qty) || 0) > stock;
            return (
              <tr key={l.id}>
                <td>
                  <Picker
                    value={l.itemId}
                    onChange={(id, opt) => {
                      const patch = { itemId: id };
                      // Only auto-fill rate if user hasn't already typed one — avoids
                      // clobbering manual entry when blur-time autopick fires.
                      if (opt && opt.lastSalePrice && !Number(l.rate)) patch.rate = opt.lastSalePrice;
                      updateLine(l.id, patch);
                    }}
                    options={state.items}
                    placeholder="Select item…"
                    getMeta={(o) => {
                      const u = state.units.find(u => u.id === o.unitId);
                      const s = stockBalance(state, o.id);
                      return `Stock: ${s} ${u?.name || ''} · last sold: ${o.lastSalePrice ? '₹' + inr(o.lastSalePrice) : '—'}`;
                    }}
                  />
                  {wouldBeNegative && (
                    <div className="mt-1">
                      <span className="chip chip-warn text-[10px]">⚠ negative stock — closing will be {stock - (Number(l.qty) || 0)}</span>
                    </div>
                  )}
                </td>
                <td><input className="num w-full" value={l.qty} onChange={(e) => updateLine(l.id, { qty: e.target.value })} /></td>
                <td className="text-mute text-sm">{unit?.name || '—'}</td>
                <td><input className="num w-full" value={l.rate} onChange={(e) => updateLine(l.id, { rate: e.target.value })} /></td>
                <td className="num text-right">{inr(lineTotal)}</td>
                <td>
                  <button onClick={() => removeLine(l.id)} className="text-mute hover:text-gold px-2">×</button>
                </td>
              </tr>
            );
          })}
        </tbody>
      </table>

      <button onClick={addLine} className="btn btn-ghost mb-6">+ Add Item</button>

      <div className="grid grid-cols-2 gap-8">
        <div>
          <div className="smcap text-mute mb-2">Other Charges</div>
          {otherCharges.map(c => (
            <div key={c.id} className="flex gap-2 mb-2">
              <Picker
                value={c.ledgerId}
                onChange={(id) => updateCharge(c.id, { ledgerId: id })}
                options={otherChargeLedgers}
                placeholder="Delivery / Service Charge / etc."
                className="flex-1"
                allowCreate
                onCreate={(name) => {
                  // Other Charges create under Direct Income (income), NOT Current Liabilities.
                  const created = { id: uid('l'), name, groupId: 'g_direct_inc', openingBalance: 0 };
                  setState(prev => ({ ...prev, ledgers: [...prev.ledgers, created] }));
                  return created;
                }}
                getMeta={(o) => state.groups.find(g => g.id === o.groupId)?.name}
              />
              <input className="num w-32" value={c.amount} onChange={(e) => updateCharge(c.id, { amount: e.target.value })} placeholder="0.00" />
              <button onClick={() => removeCharge(c.id)} className="text-mute hover:text-gold px-2">×</button>
            </div>
          ))}
          <button onClick={addCharge} className="btn btn-ghost text-xs">+ Charge</button>

          <div className="mt-4">
            <div className="smcap text-mute mb-1">Narration</div>
            <textarea value={narration} onChange={(e) => setNarration(e.target.value)} rows={2} className="w-full" placeholder="Optional notes…" />
          </div>
        </div>

        <div className="bg-paper2/60 border border-rule rounded-sm p-5">
          <div className="flex justify-between py-2 border-b border-rule">
            <span className="text-sm">Subtotal</span>
            <span className="num">{inr(total)}</span>
          </div>
          <div className="flex justify-between py-2 border-b border-rule">
            <span className="text-sm">Other Charges</span>
            <span className="num">{inr(charges)}</span>
          </div>
          <div className="flex justify-between py-3 border-b-2 border-ink">
            <span className="display text-xl">Grand Total</span>
            <span className="num text-xl font-semibold">₹ {inr(grand)}</span>
          </div>
          <div className="mt-5 flex gap-2 justify-end">
            <button onClick={reset} className="btn btn-ghost">Clear</button>
            <button onClick={save} className="btn btn-primary">Save Voucher · ⏎</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function VoucherSaved({ voucher, state, onNew, onPay }) {
  const allowReceipt = voucher.type === 'sales';
  return (
    <div className="max-w-2xl mx-auto py-8">
      <div className="flex items-center gap-4 mb-4">
        <div className="seal text-base">Saved</div>
        <div>
          <div className="smcap text-mute">{voucher.type}</div>
          <h2 className="display text-3xl">Voucher #{voucher.voucherNo}</h2>
          <div className="text-mute text-sm">{fmtDate(voucher.date)} · ₹ {inr(voucher.grand || voucher.amount || 0)}</div>
        </div>
      </div>
      <div className="rule mb-4"></div>
      <p className="text-sm mb-2"><span className="text-mute">Party · </span>{voucher.partyName || '—'}</p>
      {voucher.lines && (
        <div className="text-sm mb-4">
          {voucher.lines.map((l, i) => {
            const item = state.items.find(it => it.id === l.itemId);
            return <div key={i} className="flex justify-between py-1 border-b border-rule">
              <span>{item?.name || '—'}</span>
              <span className="num">{l.qty} × ₹{inr(l.rate)} = ₹{inr((Number(l.qty)||0)*(Number(l.rate)||0))}</span>
            </div>;
          })}
        </div>
      )}
      <div className="flex gap-2 justify-end">
        <button onClick={() => window.print()} className="btn btn-ghost">Print</button>
        {allowReceipt && <button onClick={onPay} className="btn btn-ghost">Settle in Receipt · F4</button>}
        <button onClick={onNew} className="btn btn-primary">New Voucher</button>
      </div>
    </div>
  );
}

// PURCHASES SCREEN
// ──────────────────────────────────────────────────────────────────────────

function PurchasesScreen({ state, setState, toast }) {
  const next = state.counters.purchase;
  const [date, setDate] = useState(todayISO());
  const [vendorId, setVendorId] = useState('');
  const [vendorName, setVendorName] = useState('');
  const [address, setAddress] = useState('');
  const [contact, setContact] = useState('');
  const [lines, setLines] = useState([{ id: uid('ln'), itemId: '', qty: '', rate: '' }]);
  const [narration, setNarration] = useState('');
  const [saved, setSaved] = useState(null);

  // Vendor picker: Sundry Creditors (credit vendor) + Cash in Hand + Bank Accounts + Bank O/D Accounts.
  const vendors = useMemo(() =>
    state.ledgers.filter(l => VENDOR_GROUPS.includes(l.groupId)),
    [state.ledgers]);
  const total = useMemo(() => lines.reduce((s, l) => s + (Number(l.qty) || 0) * (Number(l.rate) || 0), 0), [lines]);

  useEffect(() => {
    if (!vendorId) return;
    const v = state.ledgers.find(l => l.id === vendorId);
    if (v) {
      setVendorName(v.name);
      if (v.address) setAddress(v.address);
      if (v.contact) setContact(v.contact);
    }
  }, [vendorId]);

  const reset = () => {
    setVendorId(''); setVendorName(''); setAddress(''); setContact('');
    setLines([{ id: uid('ln'), itemId: '', qty: '', rate: '' }]);
    setNarration(''); setSaved(null); setDate(todayISO());
  };

  const save = () => {
    if (!vendorName.trim()) { toast('Vendor name required'); return; }
    const validLines = lines.filter(l => l.itemId && Number(l.qty) > 0);
    if (validLines.length === 0) {
      const hasItem = lines.some(l => l.itemId);
      const hasQty  = lines.some(l => Number(l.qty) > 0);
      if (!hasItem)        toast('Pick an item from the dropdown — typing alone is not enough');
      else if (!hasQty)    toast('Enter a quantity (> 0) for the item');
      else                 toast('Each item needs both a name and a quantity');
      return;
    }

    const next = { ...state };
    let v = state.ledgers.find(l => l.id === vendorId);
    if (!v) v = findOrCreateParty(next, vendorName, 'g_sundry_cr');
    else if (!v.locked) {
      const i = next.ledgers.findIndex(l => l.id === v.id);
      next.ledgers[i] = { ...v, address, contact };
    }

    // Update items with last purchase price
    validLines.forEach(l => {
      const i = next.items.findIndex(it => it.id === l.itemId);
      if (i >= 0) next.items[i] = { ...next.items[i], lastPurchasePrice: Number(l.rate) };
    });

    const voucherId = uid('vch');
    const voucherNo = state.counters.purchase;
    const voucher = {
      id: voucherId, type: 'purchase', voucherNo, date,
      partyId: v.id, partyName: vendorName, address, contact,
      lines: validLines.map(l => ({ ...l })),
      grand: total, narration, createdAt: Date.now(),
    };
    next.vouchers = [...next.vouchers, voucher];
    next.counters = { ...next.counters, purchase: voucherNo + 1 };

    // Dr Purchase, Cr Vendor (or Cr Cash/Bank if vendor side is a cash/bank ledger — same double-entry shape).
    const entries = [
      { id: uid('le'), voucherId, ledgerId: 'l_purchase', dr: total, cr: 0, date, narration: `Purchase — ${vendorName}` },
      { id: uid('le'), voucherId, ledgerId: v.id,         dr: 0, cr: total, date, narration: `Purchase — ${vendorName}` },
    ];
    next.ledgerEntries = [...next.ledgerEntries, ...entries];

    const stockEntries = validLines.map(l => ({
      id: uid('se'), voucherId, itemId: l.itemId, in: Number(l.qty), out: 0, rate: Number(l.rate), date
    }));
    next.stockEntries = [...next.stockEntries, ...stockEntries];

    setState(next);
    setSaved(voucher);
    toast(`Purchase #${voucherNo} saved`);
  };

  // Functional setters — avoid stale-closure overwrites when several fields change rapidly.
  const addLine = () => setLines(prev => [...prev, { id: uid('ln'), itemId: '', qty: '', rate: '' }]);
  const updateLine = (id, patch) => setLines(prev => prev.map(l => l.id === id ? { ...l, ...patch } : l));
  const removeLine = (id) => setLines(prev => prev.length > 1 ? prev.filter(l => l.id !== id) : prev);

  if (saved) return <VoucherSaved voucher={saved} state={state} onNew={reset} />;

  return (
    <div>
      <ScreenHeader title="Purchases" voucherNo={next} voucherDate={date} onDateChange={setDate} />

      <div className="grid grid-cols-2 gap-x-8 gap-y-3 mb-4">
        <div>
          <label className="smcap text-mute block mb-1">Vendor's Name</label>
          <Picker
            value={vendorId}
            onChange={(id, opt) => { setVendorId(id); if (opt) setVendorName(opt.name); }}
            onTextChange={setVendorName}
            options={vendors}
            placeholder="Type to search or create…"
            allowCreate
            onCreate={(name) => {
              const created = { id: uid('l'), name, groupId: 'g_sundry_cr', openingBalance: 0, contact: '', address: '' };
              setState(prev => ({ ...prev, ledgers: [...prev.ledgers, created] }));
              setVendorName(name);
              return created;
            }}
            getMeta={(o) => {
              const g = state.groups.find(gr => gr.id === o.groupId);
              const tag = g ? g.name : '';
              const ext = o.contact || o.address || '';
              return ext ? `${tag} · ${ext}` : tag;
            }}
            autoFocus
          />

        </div>
        <div>
          <label className="smcap text-mute block mb-1">Contact</label>
          <input value={contact} onChange={(e) => setContact(e.target.value)} className="w-full" />
        </div>
        <div className="col-span-2">
          <label className="smcap text-mute block mb-1">Address</label>
          <input value={address} onChange={(e) => setAddress(e.target.value)} className="w-full" />
        </div>
      </div>

      <div className="rule mb-4"></div>

      <table className="ledger mb-4">
        <thead>
          <tr>
            <th style={{ width: '50%' }}>Item</th>
            <th style={{ width: '14%', textAlign: 'right' }}>Qty</th>
            <th style={{ width: '8%' }}>Unit</th>
            <th style={{ width: '14%', textAlign: 'right' }}>Rate</th>
            <th style={{ width: '14%', textAlign: 'right' }}>Total</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          {lines.map((l) => {
            const item = state.items.find(i => i.id === l.itemId);
            const unit = item ? state.units.find(u => u.id === item.unitId) : null;
            const lineTotal = (Number(l.qty) || 0) * (Number(l.rate) || 0);
            return (
              <tr key={l.id}>
                <td>
                  <Picker
                    value={l.itemId}
                    onChange={(id, opt) => {
                      const patch = { itemId: id };
                      // Only auto-fill rate if user hasn't already typed one.
                      if (opt && opt.lastPurchasePrice && !Number(l.rate)) patch.rate = opt.lastPurchasePrice;
                      updateLine(l.id, patch);
                    }}
                    options={state.items}
                    placeholder="Select item…"
                    getMeta={(o) => {
                      const u = state.units.find(u => u.id === o.unitId);
                      return `Stock: ${stockBalance(state, o.id)} ${u?.name || ''} · last bought: ${o.lastPurchasePrice ? '₹'+inr(o.lastPurchasePrice) : '—'}`;
                    }}
                  />
                </td>
                <td><input className="num w-full" value={l.qty} onChange={(e) => updateLine(l.id, { qty: e.target.value })} /></td>
                <td className="text-mute text-sm">{unit?.name || '—'}</td>
                <td><input className="num w-full" value={l.rate} onChange={(e) => updateLine(l.id, { rate: e.target.value })} /></td>
                <td className="num text-right">{inr(lineTotal)}</td>
                <td><button onClick={() => removeLine(l.id)} className="text-mute hover:text-gold px-2">×</button></td>
              </tr>
            );
          })}
        </tbody>
      </table>
      <button onClick={addLine} className="btn btn-ghost mb-6">+ Add Item</button>

      <div className="grid grid-cols-2 gap-8">
        <div>
          <div className="smcap text-mute mb-1">Narration</div>
          <textarea value={narration} onChange={(e) => setNarration(e.target.value)} rows={3} className="w-full" />
        </div>
        <div className="bg-paper2/60 border border-rule rounded-sm p-5">
          <div className="flex justify-between py-3 border-b-2 border-ink">
            <span className="display text-xl">Total</span>
            <span className="num text-xl font-semibold">₹ {inr(total)}</span>
          </div>
          <div className="mt-5 flex gap-2 justify-end">
            <button onClick={reset} className="btn btn-ghost">Clear</button>
            <button onClick={save} className="btn btn-primary">Save Voucher</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ──────────────────────────────────────────────────────────────────────────
// PAYMENT & RECEIPT SCREENS (similar shape, different sign)
// ──────────────────────────────────────────────────────────────────────────

function PaymentReceiptScreen({ state, setState, toast, mode, prefill }) {
  // mode: 'PAYMENT' | 'RECEIPT'
  const isPayment = mode === 'PAYMENT';
  const counterKey = isPayment ? 'payment' : 'receipt';
  const next = state.counters[counterKey];

  const [date, setDate] = useState(todayISO());
  const [accountId, setAccountId] = useState('l_cash');
  const [partyId, setPartyId] = useState(prefill?.partyId || '');
  const [partyName, setPartyName] = useState(prefill?.partyName || '');
  const [otherSide, setOtherSide] = useState(prefill ? 'PARTY' : 'PARTY'); // 'PARTY' or 'OTHER'
  const [otherLedgerId, setOtherLedgerId] = useState('');
  const [amount, setAmount] = useState(prefill?.grand ? String(prefill.grand) : '');
  const [narration, setNarration] = useState(prefill ? `Against Sales #${prefill.voucherNo}` : '');
  const [saved, setSaved] = useState(null);

  // Available account-type ledgers (Cash / Bank / Bank OD)
  const accountLedgers = useMemo(() =>
    state.ledgers.filter(l => ['g_cash', 'g_bank', 'g_bank_od'].includes(l.groupId)), [state.ledgers]);

  // Parties for this mode: payment → vendors (Sundry Creditors); receipt → customers (Sundry Debtors)
  const partyGroup = isPayment ? 'g_sundry_cr' : 'g_sundry_dr';
  const parties = useMemo(() => state.ledgers.filter(l => l.groupId === partyGroup), [state.ledgers, partyGroup]);

  // Other-side ledgers: payment → expenses + indirect; receipt → income + other charges
  const otherLedgers = useMemo(() => state.ledgers.filter(l => {
    const g = state.groups.find(x => x.id === l.groupId);
    if (!g) return false;
    if (isPayment) return g.nature === 'expense' || g.id === 'g_curr_liab' || g.id === 'g_duties' || g.id === 'g_fixed_assets';
    return g.nature === 'income' || g.id === 'g_curr_liab' || g.id === 'g_duties';
  }), [state.ledgers, state.groups, isPayment]);

  // For party — show pending balance
  const partyBal = useMemo(() => {
    if (!partyId) return null;
    return ledgerBalance(state, partyId);
  }, [partyId, state]);

  // Show pending vouchers for the selected party
  const pendingVouchers = useMemo(() => {
    if (!partyId) return [];
    return state.vouchers.filter(v => v.partyId === partyId && (v.type === 'sales' || v.type === 'purchase'))
      .slice(-5).reverse();
  }, [partyId, state.vouchers]);

  const reset = () => {
    setAccountId('l_cash'); setPartyId(''); setPartyName(''); setOtherSide('PARTY');
    setOtherLedgerId(''); setAmount(''); setNarration(''); setSaved(null); setDate(todayISO());
  };

  const save = () => {
    const amt = Number(amount);
    if (!amt || amt <= 0) { toast('Amount required'); return; }
    if (otherSide === 'PARTY' && !partyName.trim()) { toast('Party name required'); return; }
    if (otherSide === 'OTHER' && !otherLedgerId) { toast('Select an expense/income ledger'); return; }

    const next = { ...state };
    let counterLedgerId;
    let counterName;

    if (otherSide === 'PARTY') {
      let p = state.ledgers.find(l => l.id === partyId);
      if (!p) p = findOrCreateParty(next, partyName, partyGroup);
      counterLedgerId = p.id;
      counterName = p.name;
    } else {
      counterLedgerId = otherLedgerId;
      counterName = state.ledgers.find(l => l.id === otherLedgerId)?.name || '';
    }

    const voucherId = uid('vch');
    const voucherNo = state.counters[counterKey];
    const voucher = {
      id: voucherId, type: isPayment ? 'payment' : 'receipt', voucherNo, date,
      accountId, partyId: counterLedgerId, partyName: counterName,
      grand: amt, narration, createdAt: Date.now(),
    };
    next.vouchers = [...next.vouchers, voucher];
    next.counters = { ...next.counters, [counterKey]: voucherNo + 1 };

    // Payment: Dr counter (expense or vendor), Cr account
    // Receipt: Dr account, Cr counter (customer or income)
    const entries = isPayment ? [
      { id: uid('le'), voucherId, ledgerId: counterLedgerId, dr: amt, cr: 0, date, narration: narration || `Payment — ${counterName}` },
      { id: uid('le'), voucherId, ledgerId: accountId,       dr: 0, cr: amt, date, narration: narration || `Payment — ${counterName}` },
    ] : [
      { id: uid('le'), voucherId, ledgerId: accountId,       dr: amt, cr: 0, date, narration: narration || `Receipt — ${counterName}` },
      { id: uid('le'), voucherId, ledgerId: counterLedgerId, dr: 0, cr: amt, date, narration: narration || `Receipt — ${counterName}` },
    ];
    next.ledgerEntries = [...next.ledgerEntries, ...entries];

    setState(next);
    setSaved(voucher);
    toast(`${isPayment ? 'Payment' : 'Receipt'} #${voucherNo} saved`);
  };

  if (saved) return <VoucherSaved voucher={saved} state={state} onNew={reset} />;

  return (
    <div>
      <ScreenHeader title={isPayment ? 'Payment' : 'Receipt'} voucherNo={next} voucherDate={date} onDateChange={setDate} />

      <div className="max-w-3xl">
        <div className="grid grid-cols-2 gap-x-8 gap-y-4 mb-5">
          <div>
            <label className="smcap text-mute block mb-1">Account Type</label>
            <Picker value={accountId} onChange={(id) => setAccountId(id)} options={accountLedgers}
                    getMeta={(o) => state.groups.find(g => g.id === o.groupId)?.name} />
          </div>
          <div>
            <label className="smcap text-mute block mb-1">Amount</label>
            <input className="num w-full text-lg" value={amount} onChange={(e) => setAmount(e.target.value)} placeholder="0.00" />
          </div>
        </div>

        <div className="bg-paper2/40 border border-rule rounded-sm p-4 mb-4">
          <div className="flex gap-1 mb-3 text-sm">
            <button className={`btn ${otherSide === 'PARTY' ? 'btn-primary' : 'btn-ghost'}`} onClick={() => setOtherSide('PARTY')}>
              {isPayment ? 'Pay Vendor' : 'Receive from Customer'}
            </button>
            <span className="text-mute self-center mx-1">or</span>
            <button className={`btn ${otherSide === 'OTHER' ? 'btn-primary' : 'btn-ghost'}`} onClick={() => setOtherSide('OTHER')}>
              {isPayment ? 'Direct Expense' : 'Other Income / Charge'}
            </button>
          </div>

          {otherSide === 'PARTY' ? (
            <div>
              <label className="smcap text-mute block mb-1">{isPayment ? "Vendor's Name" : 'Customer Name'}</label>
              <Picker
                value={partyId}
                onChange={(id, opt) => { setPartyId(id); if (opt) setPartyName(opt.name); }}
                onTextChange={setPartyName}
                options={parties}
                placeholder="Type to search or create…"
                allowCreate
                onCreate={(name) => {
                  const next = { ...state };
                  const l = findOrCreateParty(next, name, partyGroup);
                  setState(next); setPartyName(name);
                  return l;
                }}
                getMeta={(o) => {
                  const b = ledgerBalance(state, o.id);
                  return b.amount > 0 ? `Pending: ₹${inr(b.amount)} ${b.side === 'cr' ? 'Cr (you owe)' : 'Dr (owes you)'}` : 'No balance';
                }}
              />

              {partyBal && partyBal.amount > 0 && (
                <div className="mt-3 px-3 py-2 bg-paper border border-rule rounded-sm">
                  <div className="flex justify-between text-sm">
                    <span className="smcap text-mute">{isPayment ? 'Outstanding to vendor' : 'Outstanding from customer'}</span>
                    <span className="num font-semibold">₹ {inr(partyBal.amount)} {partyBal.side === 'cr' ? 'Cr' : 'Dr'}</span>
                  </div>
                  {pendingVouchers.length > 0 && (
                    <div className="mt-2 text-xs text-mute">
                      Recent: {pendingVouchers.map(v => `#${v.voucherNo} (${fmtDate(v.date)} ₹${inr(v.grand)})`).join(' · ')}
                    </div>
                  )}
                </div>
              )}
            </div>
          ) : (
            <div>
              <label className="smcap text-mute block mb-1">{isPayment ? 'Expense Ledger' : 'Income / Charge Ledger'}</label>
              <Picker
                value={otherLedgerId}
                onChange={(id) => setOtherLedgerId(id)}
                options={otherLedgers}
                placeholder="Select or create…"
                allowCreate
                onCreate={(name) => {
                  const next = { ...state };
                  const groupId = isPayment ? 'g_indirect_exp' : 'g_indirect_inc';
                  const l = { id: uid('l'), name, groupId, openingBalance: 0 };
                  next.ledgers.push(l); setState(next);
                  return l;
                }}
                getMeta={(o) => state.groups.find(g => g.id === o.groupId)?.name}
              />
            </div>
          )}
        </div>

        <div className="mb-4">
          <label className="smcap text-mute block mb-1">Narration</label>
          <textarea value={narration} onChange={(e) => setNarration(e.target.value)} rows={2} className="w-full" placeholder="Type anything…" />
        </div>

        <div className="flex gap-2 justify-end">
          <button onClick={reset} className="btn btn-ghost">Clear</button>
          <button onClick={save} className="btn btn-primary">Save Voucher</button>
        </div>
      </div>
    </div>
  );
}

function JournalScreen({ state, setState, toast }) {
  const next = state.counters.journal;
  const [date, setDate] = useState(todayISO());
  const [drId, setDrId] = useState('');
  const [crId, setCrId] = useState('');
  const [amount, setAmount] = useState('');
  const [narration, setNarration] = useState('');
  const [saved, setSaved] = useState(null);

  const reset = () => { setDrId(''); setCrId(''); setAmount(''); setNarration(''); setSaved(null); setDate(todayISO()); };

  const save = () => {
    if (!drId || !crId) { toast('Select both Dr and Cr ledgers'); return; }
    if (drId === crId) { toast('Dr and Cr must differ'); return; }
    const amt = Number(amount);
    if (!amt || amt <= 0) { toast('Amount required'); return; }

    const next = { ...state };
    const voucherId = uid('vch');
    const voucherNo = state.counters.journal;
    const drName = state.ledgers.find(l => l.id === drId)?.name;
    const crName = state.ledgers.find(l => l.id === crId)?.name;
    const voucher = {
      id: voucherId, type: 'journal', voucherNo, date,
      drId, crId, drName, crName, grand: amt, narration, createdAt: Date.now(),
    };
    next.vouchers = [...next.vouchers, voucher];
    next.counters = { ...next.counters, journal: voucherNo + 1 };

    const entries = [
      { id: uid('le'), voucherId, ledgerId: drId, dr: amt, cr: 0, date, narration },
      { id: uid('le'), voucherId, ledgerId: crId, dr: 0, cr: amt, date, narration },
    ];
    next.ledgerEntries = [...next.ledgerEntries, ...entries];

    setState(next);
    setSaved(voucher);
    toast(`Journal #${voucherNo} saved`);
  };

  if (saved) return <VoucherSaved voucher={saved} state={state} onNew={reset} />;

  return (
    <div className="max-w-3xl">
      <ScreenHeader title="Journal" voucherNo={next} voucherDate={date} onDateChange={setDate} />

      <div className="grid grid-cols-[80px_1fr_1fr] gap-x-3 gap-y-3 items-center mb-4">
        <div className="smcap text-wax">By / Dr</div>
        <Picker value={drId} onChange={setDrId} options={state.ledgers}
                getMeta={(o) => state.groups.find(g => g.id === o.groupId)?.name}
                placeholder="Debit ledger…" />
        <input className="num" value={amount} onChange={(e) => setAmount(e.target.value)} placeholder="Amount" />

        <div className="smcap text-wax">To / Cr</div>
        <Picker value={crId} onChange={setCrId} options={state.ledgers}
                getMeta={(o) => state.groups.find(g => g.id === o.groupId)?.name}
                placeholder="Credit ledger…" />
        <div className="num text-right text-mute">{amount && `₹ ${inr(Number(amount))}`}</div>
      </div>

      <div className="mb-5">
        <div className="smcap text-mute mb-1">Narration</div>
        <textarea value={narration} onChange={(e) => setNarration(e.target.value)} rows={2} className="w-full" placeholder="Can type anything…" />
      </div>

      <div className="flex gap-2 justify-end">
        <button onClick={reset} className="btn btn-ghost">Clear</button>
        <button onClick={save} className="btn btn-primary">Save Voucher</button>
      </div>
    </div>
  );
}

function AccountsMaster({ state, setState, toast }) {
  const [editing, setEditing] = useState(null); // null | { id, name, groupId, openingBalance, contact, address }
  const [showGroupList, setShowGroupList] = useState(false);

  const groupOf = (gid) => state.groups.find(g => g.id === gid);
  const ledgersByGroup = useMemo(() => {
    const map = {};
    state.groups.forEach(g => map[g.id] = []);
    state.ledgers.forEach(l => { if (map[l.groupId]) map[l.groupId].push(l); });
    return map;
  }, [state.ledgers, state.groups]);

  const create = () => setEditing({ id: '', name: '', groupId: '', openingBalance: '', contact: '', address: '' });
  const editL = (l) => setEditing({ ...l, openingBalance: String(l.openingBalance || '') });

  const remove = (l) => {
    if (l.locked) { toast('System ledger cannot be deleted'); return; }
    const used = state.ledgerEntries.some(e => e.ledgerId === l.id) || state.vouchers.some(v => v.partyId === l.id);
    if (used) { toast('Ledger has transactions — cannot delete'); return; }
    if (!confirm(`Delete ledger "${l.name}"?`)) return;
    setState({ ...state, ledgers: state.ledgers.filter(x => x.id !== l.id) });
    toast('Ledger deleted');
  };

  const save = () => {
    if (!editing.name.trim()) { toast('Name required'); return; }
    if (!editing.groupId) { toast('Select a group'); return; }
    const next = { ...state };
    if (editing.id) {
      const i = next.ledgers.findIndex(l => l.id === editing.id);
      next.ledgers[i] = { ...next.ledgers[i], name: editing.name.trim(), groupId: editing.groupId, openingBalance: Number(editing.openingBalance) || 0, contact: editing.contact, address: editing.address };
    } else {
      next.ledgers.push({ id: uid('l'), name: editing.name.trim(), groupId: editing.groupId, openingBalance: Number(editing.openingBalance) || 0, contact: editing.contact, address: editing.address });
    }
    setState(next); setEditing(null); toast('Ledger saved');
  };

  return (
    <div>
      <div className="flex gap-2 mb-4">
        <button onClick={create} className="btn btn-primary">+ Create Ledger</button>
        <button onClick={() => setShowGroupList(true)} className="btn btn-ghost">View 19 Predefined Groups</button>
      </div>

      <div className="grid grid-cols-2 gap-x-8 gap-y-2">
        {state.groups.map(g => (
          <div key={g.id} className="mb-3">
            <div className="flex items-baseline justify-between border-b border-rule pb-1 mb-1">
              <span className="smcap text-ink2">{g.name}</span>
              <span className="text-xs text-mute italic">{g.nature}</span>
            </div>
            {ledgersByGroup[g.id]?.length === 0 && <div className="text-xs text-mute italic py-1">— no ledgers —</div>}
            {ledgersByGroup[g.id]?.map(l => {
              const bal = ledgerBalance(state, l.id);
              return (
                <div key={l.id} className="group flex items-center justify-between py-1 hover:bg-paper2/40 px-1 rounded-sm">
                  <span className="text-sm flex items-center gap-2">
                    {l.name}
                    {l.locked && <span className="chip text-[10px]">system</span>}
                  </span>
                  <span className="flex items-center gap-3">
                    <span className="num text-xs text-mute">{bal.amount > 0 ? `₹${inr(bal.amount)} ${bal.side}` : '—'}</span>
                    <button onClick={() => editL(l)} className="opacity-0 group-hover:opacity-100 text-xs text-wax">Edit</button>
                    {!l.locked && <button onClick={() => remove(l)} className="opacity-0 group-hover:opacity-100 text-xs text-mute hover:text-gold">×</button>}
                  </span>
                </div>
              );
            })}
          </div>
        ))}
      </div>

      <Modal open={!!editing} onClose={() => setEditing(null)} title={editing?.id ? 'Alter Ledger' : 'Create Ledger'}
             footer={<>
               <button onClick={() => setEditing(null)} className="btn btn-ghost">Cancel</button>
               <button onClick={save} className="btn btn-primary">Save</button>
             </>}>
        {editing && (
          <div className="space-y-3">
            <div>
              <label className="smcap text-mute block mb-1">Ledger Name</label>
              <input value={editing.name} onChange={(e) => setEditing({ ...editing, name: e.target.value })} className="w-full" autoFocus />
            </div>
            <div>
              <label className="smcap text-mute block mb-1">Select Group</label>
              <select value={editing.groupId} onChange={(e) => setEditing({ ...editing, groupId: e.target.value })} className="w-full">
                <option value="">— select —</option>
                {state.groups.map(g => <option key={g.id} value={g.id}>{g.name} ({g.nature})</option>)}
              </select>
            </div>
            <div>
              <label className="smcap text-mute block mb-1">Opening Balance</label>
              <input className="num w-full" value={editing.openingBalance} onChange={(e) => setEditing({ ...editing, openingBalance: e.target.value })} placeholder="0.00" />
            </div>
            <div className="grid grid-cols-2 gap-3">
              <div>
                <label className="smcap text-mute block mb-1">Contact</label>
                <input value={editing.contact || ''} onChange={(e) => setEditing({ ...editing, contact: e.target.value })} className="w-full" placeholder="Optional" />
              </div>
              <div>
                <label className="smcap text-mute block mb-1">Address</label>
                <input value={editing.address || ''} onChange={(e) => setEditing({ ...editing, address: e.target.value })} className="w-full" placeholder="Optional" />
              </div>
            </div>
          </div>
        )}
      </Modal>

      <Modal open={showGroupList} onClose={() => setShowGroupList(false)} title="Predefined Ledger Groups">
        <table className="ledger">
          <thead><tr><th>#</th><th>Group</th><th>Nature</th></tr></thead>
          <tbody>
            {state.groups.map((g, i) => (
              <tr key={g.id}><td className="num text-mute">{i+1}</td><td>{g.name}</td><td className="text-mute italic">{g.nature}</td></tr>
            ))}
          </tbody>
        </table>
      </Modal>
    </div>
  );
}

function InventoryMaster({ state, setState, toast }) {
  const [editingItem, setEditingItem] = useState(null);
  const [editingUnit, setEditingUnit] = useState(null);
  const [editingSuper, setEditingSuper] = useState(null);
  const [editingSub, setEditingSub] = useState(null);

  const saveItem = () => {
    if (!editingItem.name.trim()) { toast('Item name required'); return; }
    const next = { ...state };
    if (editingItem.id) {
      const i = next.items.findIndex(x => x.id === editingItem.id);
      next.items[i] = { ...next.items[i], ...editingItem, openingBalance: Number(editingItem.openingBalance) || 0 };
    } else {
      next.items.push({ id: uid('it'), ...editingItem, openingBalance: Number(editingItem.openingBalance) || 0 });
    }
    setState(next); setEditingItem(null); toast('Item saved');
  };

  const removeItem = (it) => {
    const used = state.stockEntries.some(e => e.itemId === it.id);
    if (used) { toast('Item has transactions — cannot delete'); return; }
    if (!confirm(`Delete item "${it.name}"?`)) return;
    setState({ ...state, items: state.items.filter(x => x.id !== it.id) });
  };

  const saveUnit = () => {
    if (!editingUnit.name.trim()) return;
    const next = { ...state };
    if (editingUnit.id) {
      const i = next.units.findIndex(u => u.id === editingUnit.id);
      next.units[i] = { ...next.units[i], name: editingUnit.name.trim() };
    } else {
      next.units.push({ id: uid('u'), name: editingUnit.name.trim() });
    }
    setState(next); setEditingUnit(null);
  };
  const saveSuper = () => {
    if (!editingSuper.name.trim()) return;
    const next = { ...state };
    if (editingSuper.id) {
      const i = next.superCategories.findIndex(s => s.id === editingSuper.id);
      next.superCategories[i] = { ...next.superCategories[i], name: editingSuper.name.trim() };
    } else {
      next.superCategories.push({ id: uid('sc'), name: editingSuper.name.trim() });
    }
    setState(next); setEditingSuper(null);
  };
  const saveSub = () => {
    if (!editingSub.name.trim()) return;
    const next = { ...state };
    if (editingSub.id) {
      const i = next.subCategories.findIndex(s => s.id === editingSub.id);
      next.subCategories[i] = { ...next.subCategories[i], name: editingSub.name.trim(), superCategoryId: editingSub.superCategoryId };
    } else {
      next.subCategories.push({ id: uid('sb'), name: editingSub.name.trim(), superCategoryId: editingSub.superCategoryId });
    }
    setState(next); setEditingSub(null);
  };

  return (
    <div className="grid grid-cols-3 gap-6">
      {/* Units */}
      <div>
        <div className="flex justify-between items-baseline mb-2">
          <h3 className="display text-lg">Units</h3>
          <button onClick={() => setEditingUnit({ id: '', name: '' })} className="text-wax text-sm">+ Create</button>
        </div>
        <div className="border border-rule rounded-sm overflow-hidden">
          {state.units.map(u => (
            <div key={u.id} className="px-3 py-2 border-b border-rule last:border-b-0 flex justify-between items-center hover:bg-paper2/40 group">
              <span className="text-sm">{u.name}</span>
              <span className="opacity-0 group-hover:opacity-100 flex gap-2">
                <button onClick={() => setEditingUnit(u)} className="text-xs text-wax">Edit</button>
                <button onClick={() => {
                  if (state.items.some(i => i.unitId === u.id)) { toast('Unit in use'); return; }
                  if (confirm('Delete?')) setState({ ...state, units: state.units.filter(x => x.id !== u.id) });
                }} className="text-xs text-mute hover:text-gold">×</button>
              </span>
            </div>
          ))}
          {state.units.length === 0 && <div className="px-3 py-4 text-center text-mute text-sm italic">No units yet</div>}
        </div>
      </div>

      {/* Super Categories */}
      <div>
        <div className="flex justify-between items-baseline mb-2">
          <h3 className="display text-lg">Super Categories</h3>
          <button onClick={() => setEditingSuper({ id: '', name: '' })} className="text-wax text-sm">+ Create</button>

        <div className="border border-rule rounded-sm overflow-hidden">
          {state.superCategories.map(s => (
            <div key={s.id} className="px-3 py-2 border-b border-rule last:border-b-0 flex justify-between items-center hover:bg-paper2/40 group">
              <span className="text-sm">{s.name}</span>
              <span className="opacity-0 group-hover:opacity-100 flex gap-2">
                <button onClick={() => setEditingSuper(s)} className="text-xs text-wax">Edit</button>
                <button onClick={() => {
                  if (state.items.some(i => i.superCategoryId === s.id) || state.subCategories.some(sb => sb.superCategoryId === s.id)) { toast('Category in use'); return; }
                  if (confirm('Delete?')) setState({ ...state, superCategories: state.superCategories.filter(x => x.id !== s.id) });

              </span>
            </div>

             footer={<><button onClick={() => setEditingItem(null)} className="btn btn-ghost">Cancel</button><button onClick={saveItem} className="btn btn-primary">Save</button></>}>
        {editingItem && (
          <div className="space-y-3">
            <div>
              <label className="smcap text-mute block mb-1">Item Name</label>
              <input value={editingItem.name} onChange={(e) => setEditingItem({ ...editingItem, name: e.target.value })} className="w-full" autoFocus />
            </div>
            <div className="grid grid-cols-2 gap-3">
              <div>
                <label className="smcap text-mute block mb-1">Unit</label>
                <select value={editingItem.unitId} onChange={(e) => setEditingItem({ ...editingItem, unitId: e.target.value })} className="w-full">
                  <option value="">— Unit —</option>
                  {state.units.map(u => <option key={u.id} value={u.id}>{u.name}</option>)}
                </select>
              </div>
              <div>
                <label className="smcap text-mute block mb-1">Opening Balance</label>
                <input className="num w-full" value={editingItem.openingBalance} onChange={(e) => setEditingItem({ ...editingItem, openingBalance: e.target.value })} placeholder="0" />
              </div>
            </div>
            <div className="grid grid-cols-2 gap-3">
              <div>
                <label className="smcap text-mute block mb-1">Super Category</label>
                <select value={editingItem.superCategoryId} onChange={(e) => setEditingItem({ ...editingItem, superCategoryId: e.target.value, subCategoryId: '' })} className="w-full">
                  <option value="">— None —</option>
                  {state.superCategories.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                </select>
              </div>
              <div>
                <label className="smcap text-mute block mb-1">Sub Category</label>
                <select value={editingItem.subCategoryId} onChange={(e) => setEditingItem({ ...editingItem, subCategoryId: e.target.value })} className="w-full">
                  <option value="">— None —</option>
                  {state.subCategories.filter(s => !editingItem.superCategoryId || s.superCategoryId === editingItem.superCategoryId).map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                </select>
              </div>
            </div>
            <div className="grid grid-cols-2 gap-3">
              <div>
                <label className="smcap text-mute block mb-1">Default Sale Price</label>
                <input className="num w-full" value={editingItem.lastSalePrice || ''} onChange={(e) => setEditingItem({ ...editingItem, lastSalePrice: e.target.value })} placeholder="0.00" />
              </div>
              <div>
                <label className="smcap text-mute block mb-1">Default Purchase Price</label>
                <input className="num w-full" value={editingItem.lastPurchasePrice || ''} onChange={(e) => setEditingItem({ ...editingItem, lastPurchasePrice: e.target.value })} placeholder="0.00" />
              </div>
            </div>
          </div>
        )}
      </Modal>
    </div>
  );
}

const REPORT_LIST = [
  { id: 'sales',     name: 'Sales Reports' },
  { id: 'itemsales', name: 'Item-wise Sales Reports' },
  { id: 'gp',        name: 'Gross Profit Reports' },
  { id: 'vendor',    name: 'Vendor Analysis Reports' },
  { id: 'stock',     name: 'Stock Summary' },
  { id: 'bs',        name: 'Balance Sheet' },
  { id: 'pl',        name: 'Profit & Loss Account' },
  { id: 'cf',        name: 'Cash Flow Statement' },
];

function ReportsScreen({ state }) {
  const [active, setActive] = useState('sales');
  const [from, setFrom] = useState(state.meta.fyStart || `${new Date().getFullYear()}-04-01`);
  const [to, setTo] = useState(todayISO());

  return (
    <div>
      <ScreenHeader title="Reports" right={
        <div className="flex gap-3 items-center">
          <label className="text-sm flex items-center gap-2"><span className="smcap text-mute">From</span><input type="date" value={from} onChange={(e) => setFrom(e.target.value)} /></label>
          <label className="text-sm flex items-center gap-2"><span className="smcap text-mute">To</span><input type="date" value={to} onChange={(e) => setTo(e.target.value)} /></label>
        </div>
      } />

      <div className="grid grid-cols-[220px_1fr] gap-6">
        <div>
          {REPORT_LIST.map(r => (
            <button key={r.id} onClick={() => setActive(r.id)}
                    className={`block w-full text-left px-3 py-2 text-sm border-l-2 ${active === r.id ? 'border-wax text-wax bg-paper2/60 font-semibold' : 'border-transparent text-ink2 hover:bg-paper2/40'}`}>
              {r.name}
