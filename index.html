<style>
  /* ── THEME: LIGHT ──────────────────────────────────────────────────────── */
  :root {
    --bg:           #f8fafc;
    --bg2:          #f1f5f9;
    --bg3:          #ffffff;
    --surface:      #ffffff;
    --surface2:     #f1f5f9;
    --border:       #e2e8f0;
    --border2:      #cbd5e1;
    --ink:          #0f172a;
    --ink2:         #1e293b;
    --muted:        #64748b;
    --primary:      #6366f1;
    --primary2:     #4f46e5;
    --danger:       #ef4444;
    --danger2:      #dc2626;
    --ok:           #16a34a;
    --rule-lines:   rgba(99,102,241,0.07);
    --table-th:     rgba(224,231,255,0.65);
    --table-tr:     rgba(238,242,255,0.4);
    --chip-bg:      #e0e7ff;
    --suggest-bg:   #ffffff;
    --shadow-modal: rgba(15,23,42,0.52);
    --shadow-sm:    rgba(0,0,0,0.06);
    --moto-fill:    #6366f1;
    --moto-opacity: 0.055;
    --moto-chain-opacity: 0.048;
  }

  /* ── THEME: DARK ───────────────────────────────────────────────────────── */
  html.dark {
    --bg:           #0f172a;
    --bg2:          #1e293b;
    --bg3:          #1e293b;
    --surface:      #1e293b;
    --surface2:     #334155;
    --border:       #334155;
    --border2:      #475569;
    --ink:          #f1f5f9;
    --ink2:         #e2e8f0;
    --muted:        #94a3b8;
    --primary:      #818cf8;
    --primary2:     #6366f1;
    --danger:       #f87171;
    --danger2:      #ef4444;
    --ok:           #4ade80;
    --rule-lines:   rgba(129,140,248,0.1);
    --table-th:     rgba(30,41,59,0.95);
    --table-tr:     rgba(99,102,241,0.045);
    --chip-bg:      rgba(99,102,241,0.2);
    --suggest-bg:   #1e293b;
    --shadow-modal: rgba(0,0,0,0.72);
    --shadow-sm:    rgba(0,0,0,0.28);
    --moto-fill:    #818cf8;
    --moto-opacity: 0.085;
    --moto-chain-opacity: 0.07;
    color-scheme: dark;
  }

  /* ── BASE ──────────────────────────────────────────────────────────────── */
  html { transition: background-color 0.35s ease, color 0.25s ease; }
  html, body { background: var(--bg); color: var(--ink); font-family: 'Inter Tight', system-ui, sans-serif; }
  body { transition: background-color 0.35s ease; }

  #moto-bg {
    position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
  }
  #root { position: relative; z-index: 1; }

  /* ── GEAR & CHAIN ANIMATIONS ──────────────────────────────────────────── */
  @keyframes gearCW  { to { transform: rotate( 360deg); } }
  @keyframes gearCCW { to { transform: rotate(-360deg); } }
  @keyframes chainRoll { to { transform: translateX(24px); } }

  .gc-a { animation: gearCW   52s linear infinite; transform-box: fill-box; transform-origin: center; }
  .gc-b { animation: gearCCW  37s linear infinite; transform-box: fill-box; transform-origin: center; }
  .gc-c { animation: gearCW   21s linear infinite; transform-box: fill-box; transform-origin: center; }
  .gc-d { animation: gearCCW  13s linear infinite; transform-box: fill-box; transform-origin: center; }
  .gc-e { animation: gearCW   44s linear infinite; transform-box: fill-box; transform-origin: center; }
  .cc-r { animation: chainRoll 2.4s linear infinite; }

  @media (prefers-reduced-motion: reduce) {
    .gc-a, .gc-b, .gc-c, .gc-d, .gc-e, .cc-r { animation: none; }
  }

  /* ── TYPOGRAPHY ────────────────────────────────────────────────────────── */
  .num     { font-variant-numeric: tabular-nums; font-family: 'JetBrains Mono', monospace; }
  .display { font-family: 'Fraunces', serif; font-optical-sizing: auto; letter-spacing: -0.01em; }
  .smcap   { font-family: 'Inter Tight', sans-serif; text-transform: uppercase; letter-spacing: 0.14em; font-size: 11px; font-weight: 600; }
  .rule    { background-image: linear-gradient(to right, transparent, var(--border2) 20%, var(--border2) 80%, transparent); height: 1px; }
  .brand-rule {
    height: 3px;
    background: linear-gradient(to right, #4f46e5 0%, #6366f1 28%, #a78bfa 50%, #6366f1 72%, #4f46e5 100%);
    opacity: 0.88;
  }

  /* ── FORMS ─────────────────────────────────────────────────────────────── */
  input:focus, select:focus, textarea:focus, button:focus { outline: 2px solid var(--primary); outline-offset: 1px; }
  input, select, textarea {
    background: var(--bg3); border: 1px solid var(--border2); border-radius: 2px;
    padding: 6px 8px; color: var(--ink); font-family: inherit;
    transition: background 0.3s, border-color 0.3s, color 0.2s;
  }
  input.num, .num input { font-family: 'JetBrains Mono', monospace; text-align: right; }
  input[type=date]      { font-family: 'JetBrains Mono', monospace; }

  /* ── TABLES ────────────────────────────────────────────────────────────── */
  table.ledger { border-collapse: collapse; width: 100%; }
  table.ledger th, table.ledger td { border-bottom: 1px solid var(--border); padding: 8px 10px; text-align: left; }
  table.ledger th { background: var(--table-th); font-weight: 600; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink2); }
  table.ledger tr:hover td { background: var(--table-tr); }

  /* ── KEYS ──────────────────────────────────────────────────────────────── */
  .key     { font-family: 'JetBrains Mono', monospace; font-size: 10px; padding: 2px 5px; background: var(--ink); color: var(--bg); border-radius: 2px; letter-spacing: 0.06em; }
  .keypaper{ font-family: 'JetBrains Mono', monospace; font-size: 10px; padding: 2px 5px; background: var(--bg); color: var(--ink); border: 1px solid var(--ink); border-radius: 2px; letter-spacing: 0.06em; }

  /* ── BUTTONS ───────────────────────────────────────────────────────────── */
  .btn         { padding: 6px 14px; font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; border-radius: 2px; border: 1px solid transparent; cursor: pointer; transition: all 0.15s ease; }
  .btn-primary { background: var(--primary);  color: #fff; border-color: var(--primary); }
  .btn-primary:hover { background: var(--primary2); border-color: var(--primary2); }
  .btn-ghost   { background: transparent; color: var(--ink); border-color: var(--border2); }
  .btn-ghost:hover { background: var(--chip-bg); }
  .btn-danger  { background: transparent; color: var(--danger); border-color: var(--danger); }
  .btn-danger:hover { background: var(--danger); color: #fff; }
  .btn-warn    { background: var(--danger); color: #fff; border-color: var(--danger); }
  .btn-warn:hover { background: var(--danger2); }

  /* ── CHIPS ─────────────────────────────────────────────────────────────── */
  .chip      { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; background: var(--chip-bg); border-radius: 999px; font-size: 11px; }
  .chip-warn { background: rgba(239,68,68,0.1); color: var(--danger2); border: 1px solid rgba(239,68,68,0.28); }
  html.dark .chip-warn { background: rgba(248,113,113,0.12); color: var(--danger); border-color: rgba(248,113,113,0.3); }

  /* ── SEAL ──────────────────────────────────────────────────────────────── */
  .seal {
    width: 56px; height: 56px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #818cf8, #6366f1 60%, #4f46e5);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-family: 'Fraunces', serif; font-weight: 600; font-style: italic;
    box-shadow: 0 4px 8px rgba(79,70,229,0.35), inset 0 -2px 4px rgba(0,0,0,0.25);
    transform: rotate(-7deg);
  }

  /* ── LOGOS ─────────────────────────────────────────────────────────────── */
  .brand-logo    { height: 52px; width: auto; display: block; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.07)); }
  .brand-logo-lg { height: 80px; width: auto; display: block; margin: 0 auto; }
  html.dark .brand-logo, html.dark .brand-logo-lg { filter: brightness(1.1) drop-shadow(0 0 6px rgba(129,140,248,0.2)); }

  /* ── SUGGEST ───────────────────────────────────────────────────────────── */
  .suggest      { position: absolute; z-index: 50; background: var(--suggest-bg); border: 1px solid var(--border2); border-radius: 2px; box-shadow: 0 8px 24px var(--shadow-sm); max-height: 280px; overflow-y: auto; min-width: 100%; }
  .suggest-item { padding: 6px 10px; font-size: 13px; cursor: pointer; border-bottom: 1px solid var(--border); color: var(--ink); }
  .suggest-item:hover, .suggest-item.active { background: var(--bg2); }
  .suggest-item .meta { color: var(--muted); font-size: 11px; }

  /* ── MODAL ─────────────────────────────────────────────────────────────── */
  .modal-bg  { position: fixed; inset: 0; background: var(--shadow-modal); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .modal-card{ background: var(--surface); border: 1px solid var(--border2); border-radius: 4px; max-width: 700px; width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: 0 24px 48px var(--shadow-modal); }

  /* ── TAILWIND OVERRIDES (bg/text/border → CSS variables) ───────────────── */
  .bg-paper   { background-color: var(--surface)  !important; }
  .bg-paper2  { background-color: var(--surface2) !important; }
  .text-ink   { color: var(--ink)     !important; }
  .text-ink2  { color: var(--ink2)    !important; }
  .text-mute  { color: var(--muted)   !important; }
  .text-rule2 { color: var(--border2) !important; }
  .border-rule  { border-color: var(--border)  !important; }
  .border-rule2 { border-color: var(--border2) !important; }

  html.dark .bg-paper2\/30  { background-color: rgba(30,41,59,0.4)  !important; }
  html.dark .bg-paper2\/40  { background-color: rgba(30,41,59,0.5)  !important; }
  html.dark .bg-paper2\/50  { background-color: rgba(30,41,59,0.62) !important; }
  html.dark .bg-paper2\/60  { background-color: rgba(30,41,59,0.72) !important; }
  html.dark .bg-paper\/70   { background-color: rgba(30,41,59,0.82) !important; }
  html.dark .bg-wax         { background-color: var(--primary) !important; }
  html.dark .bg-wax\/10     { background-color: rgba(129,140,248,0.1) !important; }
  html.dark .bg-ok\/10      { background-color: rgba(74,222,128,0.1)  !important; }
  html.dark .text-wax       { color: var(--primary) !important; }
  html.dark .text-ok        { color: var(--ok)      !important; }
  html.dark .text-gold      { color: var(--danger)  !important; }
  html.dark .border-wax     { border-color: var(--primary) !important; }

  /* ── RECHARTS ──────────────────────────────────────────────────────────── */
  html.dark .recharts-text { fill: var(--ink2) !important; }
  html.dark .recharts-cartesian-grid-horizontal line,
  html.dark .recharts-cartesian-grid-vertical   line { stroke: var(--border) !important; }

  /* ── PRINT ─────────────────────────────────────────────────────────────── */
  @media print {
    body { background: white; }
    .no-print, #moto-bg { display: none !important; }
  }

  /* ── SCROLLBAR ─────────────────────────────────────────────────────────── */
  ::-webkit-scrollbar       { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  /* ── SKY TOGGLE (unchanged) ─────────────────────────────────────────────── */
  .sky-toggle {
    --toggle-size: 20px;
    --container-width: 5.625em; --container-height: 2.5em; --container-radius: 6.25em;
    --container-light-bg: #3D7EAE; --container-night-bg: #1D1F2C;
    --circle-container-diameter: 3.375em; --sun-moon-diameter: 2.125em;
    --sun-bg: #ECCA2F; --moon-bg: #C4C9D1; --spot-color: #959DB1;
    --circle-container-offset: calc((var(--circle-container-diameter) - var(--container-height)) / 2 * -1);
    --stars-color: #fff; --clouds-color: #F3FDFF; --back-clouds-color: #AACADF;
    --transition: .5s cubic-bezier(0, -0.02, 0.4, 1.25);
    --circle-transition: .3s cubic-bezier(0, -0.02, 0.35, 1.17);
    cursor: pointer; flex-shrink: 0;
  }
  .sky-toggle, .sky-toggle *, .sky-toggle *::before, .sky-toggle *::after {
    box-sizing: border-box; margin: 0; padding: 0; font-size: var(--toggle-size);
  }
  .sky-toggle__checkbox { display: none; }
  .sky-toggle__container {
    width: var(--container-width); height: var(--container-height);
    background-color: var(--container-light-bg); border-radius: var(--container-radius);
    overflow: hidden; cursor: pointer;
    box-shadow: 0em -0.062em 0.062em rgba(0,0,0,0.25), 0em 0.062em 0.125em rgba(255,255,255,0.94);
    transition: var(--transition); position: relative;
  }
  .sky-toggle__container::before {
    content: ""; position: absolute; z-index: 1; inset: 0;
    box-shadow: 0em 0.05em 0.187em rgba(0,0,0,0.25) inset; border-radius: var(--container-radius);
  }
  .sky-toggle__circle-container {
    width: var(--circle-container-diameter); height: var(--circle-container-diameter);
    background-color: rgba(255,255,255,0.1); position: absolute;
    left: var(--circle-container-offset); top: var(--circle-container-offset);
    border-radius: var(--container-radius);
    box-shadow: inset 0 0 0 3.375em rgba(255,255,255,0.1), 0 0 0 0.625em rgba(255,255,255,0.1), 0 0 0 1.25em rgba(255,255,255,0.1);
    display: flex; transition: var(--circle-transition); pointer-events: none;
  }
  .sky-toggle__sun-moon-container {
    pointer-events: auto; position: relative; z-index: 2;
    width: var(--sun-moon-diameter); height: var(--sun-moon-diameter);
    margin: auto; border-radius: var(--container-radius); background-color: var(--sun-bg);
    box-shadow: 0.062em 0.062em 0.062em 0em rgba(254,255,239,0.61) inset, 0em -0.062em 0.062em 0em #a1872a inset;
    filter: drop-shadow(0.062em 0.125em 0.125em rgba(0,0,0,0.25)); overflow: hidden; transition: var(--transition);
  }
  .sky-toggle__moon {
    transform: translateX(100%); width: 100%; height: 100%; background-color: var(--moon-bg);
    border-radius: inherit;
    box-shadow: 0.062em 0.062em 0.062em 0em rgba(254,255,239,0.61) inset, 0em -0.062em 0.062em 0em #969696 inset;
    transition: var(--transition); position: relative;
  }
  .sky-toggle__spot { position: absolute; top: 0.75em; left: 0.312em; width: 0.75em; height: 0.75em; border-radius: var(--container-radius); background-color: var(--spot-color); box-shadow: 0em 0.0312em 0.062em rgba(0,0,0,0.25) inset; }
  .sky-toggle__spot:nth-of-type(2)      { width: 0.375em; height: 0.375em; top: 0.937em; left: 1.375em; }
  .sky-toggle__spot:nth-last-of-type(3) { width: 0.25em;  height: 0.25em;  top: 0.312em; left: 0.812em; }
  .sky-toggle__clouds {
    width: 1.25em; height: 1.25em; background-color: var(--clouds-color); border-radius: var(--container-radius);
    position: absolute; bottom: -0.625em; left: 0.312em;
    box-shadow: 0.937em 0.312em var(--clouds-color), -0.312em -0.312em var(--back-clouds-color), 1.437em 0.375em var(--clouds-color), 0.5em -0.125em var(--back-clouds-color), 2.187em 0 var(--clouds-color), 1.25em -0.062em var(--back-clouds-color), 2.937em 0.312em var(--clouds-color), 2em -0.312em var(--back-clouds-color), 3.625em -0.062em var(--clouds-color), 2.625em 0em var(--back-clouds-color), 4.5em -0.312em var(--clouds-color), 3.375em -0.437em var(--back-clouds-color), 4.625em -1.75em 0 0.437em var(--clouds-color), 4em -0.625em var(--back-clouds-color), 4.125em -2.125em 0 0.437em var(--back-clouds-color);
    transition: 0.5s cubic-bezier(0, -0.02, 0.4, 1.25);
  }
  .sky-toggle__stars-container { position: absolute; color: var(--stars-color); top: -100%; left: 0.312em; width: 2.75em; height: auto; transition: var(--transition); }
  .sky-toggle__checkbox:checked + .sky-toggle__container { background-color: var(--container-night-bg); }
  .sky-toggle__checkbox:checked + .sky-toggle__container .sky-toggle__circle-container { left: calc(100% - var(--circle-container-offset) - var(--circle-container-diameter)); }
  .sky-toggle__checkbox:checked + .sky-toggle__container .sky-toggle__circle-container:hover { left: calc(100% - var(--circle-container-offset) - var(--circle-container-diameter) - 0.187em); }
  .sky-toggle__circle-container:hover { left: calc(var(--circle-container-offset) + 0.187em); }
  .sky-toggle__checkbox:checked + .sky-toggle__container .sky-toggle__moon { transform: translate(0); }
  .sky-toggle__checkbox:checked + .sky-toggle__container .sky-toggle__clouds { bottom: -4.062em; }
  .sky-toggle__checkbox:checked + .sky-toggle__container .sky-toggle__stars-container { top: 50%; transform: translateY(-50%); }
</style>

<!-- ── MOTORCYCLE BACKGROUND — fixed, z-index:0, pointer-events:none ──────── -->
<div id="moto-bg" aria-hidden="true">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" width="100%" height="100%">
<defs>
  <!-- Roller chain pattern: 24×16 tile — each tile has one roller + connecting plates -->
  <pattern id="cp" x="0" y="0" width="24" height="16" patternUnits="userSpaceOnUse">
    <circle cx="4" cy="8" r="3.8" style="fill:none;stroke:var(--moto-fill);stroke-width:1.4;"/>
    <circle cx="4" cy="8" r="1.6" style="fill:none;stroke:var(--moto-fill);stroke-width:0.8;"/>
    <line x1="7.8" y1="4.8" x2="20.2" y2="4.8" style="stroke:var(--moto-fill);stroke-width:1.4;"/>
    <line x1="7.8" y1="11.2" x2="20.2" y2="11.2" style="stroke:var(--moto-fill);stroke-width:1.4;"/>
  </pattern>
</defs>

<!-- ── GEAR A: Large 14-tooth, top-right (partially off-screen), CW 52s ── -->
<g transform="translate(1418,112)">
  <g class="gc-a">

// 20 predefined ledger groups, each tagged with its accounting nature.
// nature: 'asset' | 'liability' | 'income' | 'expense'
//
// Stock-in-Hand is a special "computed" group — its balance is NOT posted from
// vouchers (no journal entries hit it). It is auto-derived from the inventory
// module at any date as Σ(qty on hand × weighted-avg cost). This is exactly
// how Tally handles integrated accounts + inventory: the Trading A/c picks up
// closing stock from inventory, and the Balance Sheet shows the same figure as
// an asset. Keeping it as a group (rather than a hard-coded BS line) lets us
// list it in the standard Group browser and keep the architecture uniform.

// Date helpers — anchored to IST (Asia/Kolkata) so a 1 AM voucher in India
// stays on the calendar day the user expects, never UTC-shifted to "yesterday".
const todayISO = () => {
  // 'en-CA' returns YYYY-MM-DD which matches our internal ISO format.
  return new Date().toLocaleDateString('en-CA', { timeZone: 'Asia/Kolkata' });
};
const fmtDate = (iso) => {
  if (!iso) return '';
  const [y,m,d] = iso.split('-');
  return `${d}/${m}/${y}`;
};
const fmtDateLong = (iso) => {
  if (!iso) return '';
  const [y,m,d] = iso.split('-');
  const dt = new Date(Date.UTC(Number(y), Number(m)-1, Number(d)));
  // Render as e.g. "Wednesday, 29 April 2026" in IST
  return dt.toLocaleDateString('en-IN', { timeZone: 'Asia/Kolkata', weekday: 'long', day: '2-digit', month: 'long', year: 'numeric' });
};
const inr = (n) => {
  const num = Number(n) || 0;
  const sign = num < 0 ? '-' : '';
  const abs = Math.abs(num);
  // Indian numbering with 2dp
  const s = abs.toFixed(2);
  const [intP, decP] = s.split('.');
  const last3 = intP.slice(-3);
  const rest = intP.slice(0, -3);
  const restF = rest.replace(/\B(?=(\d{2})+(?!\d))/g, ',');
  return sign + (rest ? restF + ',' + last3 : last3) + '.' + decP;
};
const uid = (prefix) => `${prefix}_${Date.now().toString(36)}_${Math.random().toString(36).slice(2,8)}`;

// STORAGE — Layered: Firestore (primary, cross-device)
//                  ↔ localStorage (instant cache + offline)
//                  + daily snapshots (history viewer)
//                  + optional auto-download (filesystem failsafe)

const SNAPSHOT_KEY      = 'bikecare_erp_v1_snaps';
const LAST_DOWNLOAD_KEY = 'bikecare_erp_v1_lastDl';
const AUTO_DL_PREF_KEY  = 'bikecare_erp_v1_autoDl';
const SNAPSHOT_LIMIT    = 30; // keep 30 most recent days, plus pinned

const initialState = () => ({
  meta: {
    businessName: BUSINESS_NAME,        // sourced from the code-permanent constant
    fyStart: `${new Date().getFullYear()}-04-01`,
  },
  groups: DEFAULT_GROUPS,
  ledgers: DEFAULT_LEDGERS,
  units: DEFAULT_UNITS,
  superCategories: [],
  subCategories: [],
  items: [],
  vouchers: [],
  ledgerEntries: [],
  stockEntries: [],
  counters: { sales: 1, purchase: 1, payment: 1, receipt: 1, journal: 1 },
});

const normalizeState = (parsed) => {
  const base = initialState();
  // Migration: if loaded state has 19 groups (V2.2 era), append Stock-in-Hand
  // so reports work without forcing a wipe. If groups is missing entirely or
  // wrong-shaped, fall back to defaults.
  let groups = (parsed && parsed.groups && Array.isArray(parsed.groups)) ? parsed.groups : DEFAULT_GROUPS;
  if (groups.length === 19 && !groups.find(g => g.id === 'g_stock_in_hand')) {
    groups = [...groups, { id: 'g_stock_in_hand', name: 'Stock-in-Hand', nature: 'asset', order: 20, computed: true }];
  }
  if (groups.length !== 20) groups = DEFAULT_GROUPS;
  const merged = {
    ...base,
    ...(parsed || {}),
    groups,
  };
  // Force businessName to the code constant — it is intentionally not editable
  // from the UI. To rename for another business, edit BUSINESS_NAME in source.
  merged.meta = { ...(parsed?.meta || {}), ...base.meta, businessName: BUSINESS_NAME };
  // Drop the legacy 'since' field if present in old saved data
  if (merged.meta.since) delete merged.meta.since;

  // MIGRATION v2.4: Fix items that were saved with id:'' due to the spread-order
  // bug in saveItem (id: uid('it'), ...editingItem — editingItem.id='' overwrote uid).
  // Assign fresh uids to any item with a falsy id so they work correctly in pickers.
  if (Array.isArray(merged.items)) {
    merged.items = merged.items.map(item =>
      item.id ? item : { ...item, id: uid('it') }
    );
  }

  return merged;
};

// — localStorage mirror (Tier 2: instant first paint + offline) —
const loadStateLocal = () => {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return initialState();
    return normalizeState(JSON.parse(raw));
  } catch (e) {
    console.error('Local load failed', e);
    return initialState();
  }
};
const saveStateLocal = (s) => {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch (e) { console.error(e); }
};

// — daily snapshots ring buffer (Tier 3: in-app history) —
const loadSnapshots = () => {
  try {
    const raw = localStorage.getItem(SNAPSHOT_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch (e) { return []; }
};
const saveSnapshots = (arr) => {
  try { localStorage.setItem(SNAPSHOT_KEY, JSON.stringify(arr)); } catch (e) { console.error(e); }
};
const captureSnapshotIfNeeded = (s) => {
  try {
    const today = todayISO();
    const snaps = loadSnapshots();
    const idx = snaps.findIndex(x => x.date === today);
    const sales = (s.vouchers || []).filter(v => v.type === 'sales');
    const meta = {
      date: today,
      voucherCount: (s.vouchers || []).length,
      salesCount: sales.length,
      totalSales: sales.reduce((sum, v) => sum + (Number(v.grand) || 0), 0),
      capturedAt: Date.now(),
      pinned: idx >= 0 ? !!snaps[idx].pinned : false,
      payload: JSON.stringify(s),
    };
    if (idx >= 0) snaps[idx] = meta; else snaps.push(meta);
    // Keep most recent SNAPSHOT_LIMIT, plus any pinned, plus today's
    const sorted = snaps.sort((a, b) => b.date.localeCompare(a.date));
    const trimmed = sorted.filter((x, i) => x.pinned || x.date === today || i < SNAPSHOT_LIMIT);
    saveSnapshots(trimmed);
  } catch (e) { console.error('Snapshot capture failed', e); }
};
const pinSnapshot = (date, pin) => {
  const snaps = loadSnapshots();
  const idx = snaps.findIndex(x => x.date === date);
  if (idx >= 0) { snaps[idx].pinned = !!pin; saveSnapshots(snaps); }
};
const deleteSnapshot = (date) => {
  saveSnapshots(loadSnapshots().filter(x => x.date !== date));
};

// — daily auto-download (Tier 4: optional filesystem failsafe) —
const triggerDailyAutoDownload = (s) => {
  try {
    if (localStorage.getItem(AUTO_DL_PREF_KEY) !== '1') return;
    const today = todayISO();
    if (localStorage.getItem(LAST_DOWNLOAD_KEY) === today) return;
    const blob = new Blob([JSON.stringify(s, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `bikecare-erp-${today}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    localStorage.setItem(LAST_DOWNLOAD_KEY, today);
  } catch (e) { console.error('Auto-download failed', e); }
};

// — Firestore (Tier 1: primary, cross-device, real-time) —
const FIRESTORE_DOC_PATH = 'app/state'; // single doc; easy to migrate to per-collection later

const fbAuth = () => (typeof window !== 'undefined' ? window.__BC_AUTH : null);
const fbDB   = () => (typeof window !== 'undefined' ? window.__BC_DB   : null);
const fbNS   = () => (typeof window !== 'undefined' ? window.__BC_FS   : null);
const cloudReady = () => !!(fbAuth() && fbDB() && fbNS());

// ──────────────────────────────────────────────────────────────────────────
// ACCOUNTING HELPERS
// ──────────────────────────────────────────────────────────────────────────

// Compute balance for a single ledger as of optional date (inclusive)
// Returns positive number with separate 'side' indicating Dr or Cr balance
function ledgerBalance(state, ledgerId, asOfDate) {
  const ledger = state.ledgers.find(l => l.id === ledgerId);
  if (!ledger) return { amount: 0, side: 'dr' };
  const group = state.groups.find(g => g.id === ledger.groupId);
  const naturalDr = group && (group.nature === 'asset' || group.nature === 'expense');
  let dr = 0, cr = 0;
  // Opening balance: assets/expenses are normally debit; liabilities/income normally credit
  if (ledger.openingBalance) {
    if (naturalDr) dr += Number(ledger.openingBalance) || 0;
    else cr += Number(ledger.openingBalance) || 0;
  }
  state.ledgerEntries.forEach(e => {
    if (e.ledgerId !== ledgerId) return;
    if (asOfDate && e.date > asOfDate) return;
    dr += Number(e.dr) || 0;
    cr += Number(e.cr) || 0;
  });
  const net = dr - cr;
  return { amount: Math.abs(net), side: net >= 0 ? 'dr' : 'cr', dr, cr };
}

// Stock balance for an item
function stockBalance(state, itemId, asOfDate) {
  const item = state.items.find(i => i.id === itemId);
  if (!item) return 0;
  let bal = Number(item.openingBalance) || 0;
  state.stockEntries.forEach(e => {
    if (e.itemId !== itemId) return;
    if (asOfDate && e.date > asOfDate) return;
    bal += (Number(e.in) || 0) - (Number(e.out) || 0);
  });
  return bal;
}

// Find or create a customer/vendor ledger by name
function findOrCreateParty(state, name, groupId) {
  const trimmed = (name || '').trim();
  if (!trimmed) return null;
  const existing = state.ledgers.find(l => l.name.toLowerCase() === trimmed.toLowerCase());
  if (existing) return existing;
  const newL = { id: uid('l'), name: trimmed, groupId, openingBalance: 0, contact: '', address: '', vehicle: '' };
  state.ledgers.push(newL);
  return newL;
}

// ══════════════════════════════════════════════════════════════════════════
// INTEGRATED INVENTORY ↔ FINANCIAL ACCOUNTING HELPERS
//
// These helpers implement the bridge between the inventory module and the
// double-entry books — the single most important piece of a Tally-style ERP.
//
// In Tally's "Integrated Accounts with Inventory" mode:
//   • Purchases hit the Purchase A/c (P&L Dr) AND the inventory module (qty in)
//   • Sales hit the Sales A/c (P&L Cr) AND the inventory module (qty out)
//   • Closing Stock value is COMPUTED from inventory at any date — never posted
//   • Trading A/c: Opening Stock + Purchases + Direct Exp = Cost side
//                  Sales + Closing Stock + Direct Inc       = Revenue side
//                  Difference = Gross Profit (or Loss)
//   • P&L: starts from Gross Profit, adds Indirect Income, subtracts Indirect
//          Expenses → Net Profit (transferred to Capital on BS)
//   • Balance Sheet: Closing Stock appears as an asset under Stock-in-Hand
//
// Valuation method: Weighted Average Cost (Tally's default for stock items).
// Each purchase updates the running average; sales draw at that average.
// ══════════════════════════════════════════════════════════════════════════

// Weighted-average cost of an item as of a date (inclusive). Walks the stock
// entries chronologically and recomputes avg cost on each inward (purchase).
// Outward (sales) does NOT change the avg cost — only consumes qty at that avg.
function itemAvgCost(state, itemId, asOfDate) {
  const item = state.items.find(i => i.id === itemId);
  if (!item) return 0;
  const opening = Number(item.openingBalance) || 0;
  // If user provided an opening cost (lastPurchasePrice as starting estimate)
  // use it as the seed cost. Otherwise start at 0 — it will get set on first IN.
  const seedCost = Number(item.lastPurchasePrice) || 0;

  let qty = opening;
  let totalValue = opening * seedCost;

  const entries = state.stockEntries
    .filter(e => e.itemId === itemId && (!asOfDate || e.date <= asOfDate))
    .sort((a, b) => (a.date.localeCompare(b.date)) || (a.id || '').localeCompare(b.id || ''));

  for (const e of entries) {
    const inQty = Number(e.in) || 0;
    const outQty = Number(e.out) || 0;
    const rate = Number(e.rate) || 0;
    if (inQty > 0) {
      // Weighted-avg recompute on inward
      totalValue += inQty * rate;
      qty += inQty;
    }
    if (outQty > 0) {
      // Outward at current avg cost — drains value proportionally
      const avg = qty > 0 ? totalValue / qty : 0;
      totalValue -= outQty * avg;
      qty -= outQty;
      if (qty < 0) {
        // Negative stock — value goes negative too. Reset basis if it climbs back.
        totalValue = qty * (avg || rate);
      }
    }
  }
  return qty > 0 ? totalValue / qty : (seedCost || 0);
}

// Total inventory value (Stock-in-Hand) as of a date — Σ(qty × avg cost) across items.
function inventoryValue(state, asOfDate) {
  return state.items.reduce((sum, it) => {
    const qty = stockBalance(state, it.id, asOfDate);
    if (qty === 0) return sum;
    const cost = itemAvgCost(state, it.id, asOfDate);
    return sum + qty * cost;
  }, 0);
}

// Date helper — return the day BEFORE an ISO date (used for "as of day before from")
function dayBefore(iso) {
  if (!iso) return iso;
  const [y, m, d] = iso.split('-').map(Number);
  const dt = new Date(Date.UTC(y, m - 1, d));
  dt.setUTCDate(dt.getUTCDate() - 1);
  const yy = dt.getUTCFullYear();
  const mm = String(dt.getUTCMonth() + 1).padStart(2, '0');
  const dd = String(dt.getUTCDate()).padStart(2, '0');
  return `${yy}-${mm}-${dd}`;
}

// Compute Trading A/c figures for a period.
// Returns { openingStock, purchases, directExp, sales, closingStock, directInc, grossProfit }
// where grossProfit = (sales + closingStock + directInc) - (openingStock + purchases + directExp)
function tradingAccountFigures(state, from, to) {
  const openingDate = dayBefore(from);
  const openingStock = inventoryValue(state, openingDate);
  const closingStock = inventoryValue(state, to);

  let purchases = 0, sales = 0, directExp = 0, directInc = 0;
  state.ledgerEntries.forEach(e => {
    if (!inRange(e.date, from, to)) return;
    const l = state.ledgers.find(x => x.id === e.ledgerId);
    if (!l) return;
    const g = state.groups.find(x => x.id === l.groupId);
    if (!g) return;
    const drCr = (Number(e.dr) || 0) - (Number(e.cr) || 0);
    if (g.id === 'g_purchase')        purchases  += drCr;       // Dr balance
    else if (g.id === 'g_sales')      sales      += -drCr;      // Cr balance
    else if (g.id === 'g_direct_exp') directExp  += drCr;
    else if (g.id === 'g_direct_inc') directInc  += -drCr;
  });

  const grossProfit = (sales + closingStock + directInc) - (openingStock + purchases + directExp);
  return { openingStock, purchases, directExp, sales, closingStock, directInc, grossProfit };
}

// Compute P&L figures starting from Trading A/c gross profit.
// Returns { grossProfit, indirectInc, indirectExp, netProfit, indirectIncByLedger, indirectExpByLedger, ... }
function profitLossFigures(state, from, to) {
  const trading = tradingAccountFigures(state, from, to);
  let indirectInc = 0, indirectExp = 0;
  const incByLedger = {};
  const expByLedger = {};

  state.ledgerEntries.forEach(e => {
    if (!inRange(e.date, from, to)) return;
    const l = state.ledgers.find(x => x.id === e.ledgerId);
    if (!l) return;
    const g = state.groups.find(x => x.id === l.groupId);
    if (!g) return;
    const drAmt = Number(e.dr) || 0;
    const crAmt = Number(e.cr) || 0;
    if (g.id === 'g_indirect_inc') {
      indirectInc += (crAmt - drAmt);
      if (!incByLedger[l.id]) incByLedger[l.id] = { name: l.name, amount: 0 };
      incByLedger[l.id].amount += (crAmt - drAmt);
    } else if (g.id === 'g_indirect_exp') {
      indirectExp += (drAmt - crAmt);
      if (!expByLedger[l.id]) expByLedger[l.id] = { name: l.name, amount: 0 };
      expByLedger[l.id].amount += (drAmt - crAmt);
    }
  });

  const netProfit = trading.grossProfit + indirectInc - indirectExp;
  return {
    ...trading,
    indirectInc, indirectExp, netProfit,
    incByLedger, expByLedger,
  };
}

// Posted-only ledger balance (no opening) — entries within / up to a date.
// Returns { dr, cr, net } where net = dr - cr (positive Dr, negative Cr).
function ledgerPostedBalance(state, ledgerId, asOfDate) {
  let dr = 0, cr = 0;
  state.ledgerEntries.forEach(e => {
    if (e.ledgerId !== ledgerId) return;
    if (asOfDate && e.date > asOfDate) return;
    dr += Number(e.dr) || 0;
    cr += Number(e.cr) || 0;
  });
  return { dr, cr, net: dr - cr };
}

// Running-balance entries for a single ledger between from and to.
// Returns { opening: {dr,cr,net}, rows: [{...entry, runningDr, runningCr, runningSide, voucher}] , closing }
function ledgerStatement(state, ledgerId, from, to) {
  const ledger = state.ledgers.find(l => l.id === ledgerId);
  if (!ledger) return { opening: { dr: 0, cr: 0, net: 0 }, rows: [], closing: { dr: 0, cr: 0, net: 0 } };
  const group = state.groups.find(g => g.id === ledger.groupId);
  const naturalDr = group && (group.nature === 'asset' || group.nature === 'expense');
  const ob = Number(ledger.openingBalance) || 0;
  const obDr = naturalDr ? ob : 0;
  const obCr = naturalDr ? 0 : ob;

  // Opening = OB + entries before 'from'
  let openingDr = obDr, openingCr = obCr;
  state.ledgerEntries.forEach(e => {
    if (e.ledgerId !== ledgerId) return;
    if (e.date < from) {
      openingDr += Number(e.dr) || 0;
      openingCr += Number(e.cr) || 0;
    }
  });
  const openingNet = openingDr - openingCr;

  // In-range entries, sorted chronologically
  const rows = state.ledgerEntries
    .filter(e => e.ledgerId === ledgerId && inRange(e.date, from, to))
    .sort((a, b) => (a.date.localeCompare(b.date)) || (a.id || '').localeCompare(b.id || ''));

  // Decorate with voucher info + running balance
  let runningNet = openingNet;
  const decorated = rows.map(e => {
    const v = state.vouchers.find(x => x.id === e.voucherId);
    runningNet += (Number(e.dr) || 0) - (Number(e.cr) || 0);
    return {
      ...e,
      voucher: v,
      runningNet,
      runningAbs: Math.abs(runningNet),
      runningSide: runningNet >= 0 ? 'Dr' : 'Cr',
    };
  });

  return {
    opening: { dr: openingDr, cr: openingCr, net: openingNet },
    rows: decorated,
    closing: { dr: openingDr + rows.reduce((s, e) => s + (Number(e.dr) || 0), 0),
               cr: openingCr + rows.reduce((s, e) => s + (Number(e.cr) || 0), 0),
               net: runningNet },
  };
}

// Trial balance — every ledger with non-zero closing as of a date, side resolved.
// Plus a virtual row for Stock-in-Hand if the user wants TB to reconcile to BS.
// Returns rows + totals { totalDr, totalCr } and a difference flag.
function trialBalance(state, asOfDate) {
  const rows = [];
  state.ledgers.forEach(l => {
    const bal = ledgerBalance(state, l.id, asOfDate);
    if (bal.amount === 0) return;
    const g = state.groups.find(x => x.id === l.groupId);
    rows.push({
      id: l.id, name: l.name, group: g, groupName: g?.name || '',
      dr: bal.side === 'dr' ? bal.amount : 0,
      cr: bal.side === 'cr' ? bal.amount : 0,
    });
  });
  rows.sort((a, b) => (a.group?.order || 99) - (b.group?.order || 99) || a.name.localeCompare(b.name));
  const totalDr = rows.reduce((s, r) => s + r.dr, 0);
  const totalCr = rows.reduce((s, r) => s + r.cr, 0);
  return { rows, totalDr, totalCr, difference: totalDr - totalCr };
}

// Ageing buckets for an outstanding amount.
function ageingBucket(daysOld) {
  if (daysOld <= 30) return '0-30';
  if (daysOld <= 60) return '31-60';
  if (daysOld <= 90) return '61-90';
  if (daysOld <= 180) return '91-180';
  return '180+';
}

// Compute days between two ISO dates (b - a)
function daysBetween(aISO, bISO) {
  const a = new Date(aISO + 'T00:00:00Z');
  const b = new Date(bISO + 'T00:00:00Z');
  return Math.round((b - a) / (24 * 60 * 60 * 1000));
}

// FIFO bill-wise ageing for a party.  Walks vouchers chronologically; receipts
// (Cr the customer ledger) consume oldest open sales bills first.  Returns
// outstanding bills only, with days-old computed against asOfDate.
function billwiseAgeing(state, ledgerId, asOfDate, partyType /* 'customer' | 'vendor' */) {
  const isCustomer = partyType === 'customer';
  const billType = isCustomer ? 'sales' : 'purchase';
  const settlementType = isCustomer ? 'receipt' : 'payment';

  // Bills (sales for customer / purchases for vendor)
  const bills = state.vouchers
    .filter(v => v.partyId === ledgerId && v.type === billType && v.date <= asOfDate)
    .sort((a, b) => a.date.localeCompare(b.date))
    .map(v => ({
      id: v.id, voucherNo: v.voucherNo, date: v.date,
      amount: Number(v.grand) || 0, settled: 0, type: v.type,
    }));

  // Settlements (receipts from this customer / payments to this vendor)
  const settlements = state.vouchers
    .filter(v => v.partyId === ledgerId && v.type === settlementType && v.date <= asOfDate)
    .sort((a, b) => a.date.localeCompare(b.date));

  // Apply settlements FIFO to oldest unsettled bills
  let totalSettlement = settlements.reduce((s, v) => s + (Number(v.grand) || 0), 0);
  for (const b of bills) {
    if (totalSettlement <= 0) break;
    const open = b.amount - b.settled;
    const apply = Math.min(open, totalSettlement);
    b.settled += apply;
    totalSettlement -= apply;
  }

  // Build outstanding rows
  const out = bills
    .map(b => ({
      ...b,
      outstanding: b.amount - b.settled,
      daysOld: daysBetween(b.date, asOfDate),
      bucket: ageingBucket(daysBetween(b.date, asOfDate)),
    }))
    .filter(b => b.outstanding > 0.005);

  // If settlements exceed bills, surplus is "On account" credit (not assigned to a bill)
  const onAccount = totalSettlement > 0.005 ? totalSettlement : 0;
  return { rows: out, onAccount };
}

// Cash & Bank book — Tally-style.  Returns { opening, rows, closing } where
// rows = [{ date, voucher, particulars, dr, cr, runningNet }] ordered by date.
// 'particulars' is the OTHER side of the entry (the contra ledger), which is
// what makes a Cash Book readable: "Sales – Ramesh" rather than just "Sales".
function bookForLedger(state, ledgerId, from, to) {
  const ledger = state.ledgers.find(l => l.id === ledgerId);
  if (!ledger) return { opening: { net: 0 }, rows: [], closing: { net: 0 } };
  const group = state.groups.find(g => g.id === ledger.groupId);
  const naturalDr = group && (group.nature === 'asset' || group.nature === 'expense');
  const ob = Number(ledger.openingBalance) || 0;
  let openingNet = naturalDr ? ob : -ob;
  state.ledgerEntries.forEach(e => {
    if (e.ledgerId !== ledgerId) return;
    if (e.date < from) openingNet += (Number(e.dr) || 0) - (Number(e.cr) || 0);
  });

  const inRangeEntries = state.ledgerEntries
    .filter(e => e.ledgerId === ledgerId && inRange(e.date, from, to))
    .sort((a, b) => (a.date.localeCompare(b.date)) || (a.id || '').localeCompare(b.id || ''));

  let running = openingNet;
  const rows = inRangeEntries.map(e => {
    // Find the contra side(s) of the same voucher
    const sibling = state.ledgerEntries.filter(x => x.voucherId === e.voucherId && x.ledgerId !== ledgerId);
    const particulars = sibling.length === 0
      ? (e.narration || '—')
      : sibling.map(s => state.ledgers.find(l => l.id === s.ledgerId)?.name || '?').join(', ');
    const v = state.vouchers.find(x => x.id === e.voucherId);
    running += (Number(e.dr) || 0) - (Number(e.cr) || 0);
    return {
      ...e, voucher: v, particulars, runningNet: running,
    };
  });

  return {
    opening: { net: openingNet, side: openingNet >= 0 ? 'Dr' : 'Cr', amount: Math.abs(openingNet) },
    rows,
    closing: { net: running, side: running >= 0 ? 'Dr' : 'Cr', amount: Math.abs(running) },
  };
}

// inRange: small date helper used throughout the report code. Defined here so
// helpers above can use it; the original ReportsScreen already redefines it
// (idempotent — same shape).
function inRange(date, from, to) {
  return date >= from && date <= to;
}

// Autocomplete picker — supports keyboard nav, fast filter, "create new" inline.
//
// V2.4 FIX — Picker architecture rewrite; see function Picker below.
// Earlier versions only auto-picked exact-match typed text on blur / Enter / Tab.
// In React 18 those state updates are batched, so when the user typed an item
// name and clicked Save Voucher, the order was:
//   1. blur fires → tryAutoPickExact → setLines QUEUED (not flushed)
//   2. click fires → save() runs synchronously with STALE lines (itemId = '')
//   3. validation fails → toast "Pick an item from the dropdown — typing alone is not enough"
//   4. React finally flushes the queued setLines, but the toast already fired.
// Three previous patches all stayed on the wrong side of this race because they
// hooked into blur / keydown — every one of which loses to the click handler.
// The real fix is to push the autopick UP into the keystroke handler, so by the
// time the user releases the last key the parent's lines[i].itemId is already set
// and there is nothing left to flush when click arrives.
// ── Picker v2.4 ─────────────────────────────────────────────────────────────
// Root-cause fixes applied in this version:
//
// BUG #1 (PRIMARY) — handleInput cleared itemId on every post-exact-match
//   keystroke via a stale closure `value`.  The old code called
//   `onChange('', null)` whenever the typed text didn't exactly match any
//   option.  Because `value` was read from the render-time closure (already
//   set to the picked id from the last render), any extra character the user
//   typed after a successful exact-match pick immediately wiped the selection.
//   FIX: handleInput now only clears the parent when the field is fully empty.
//   Partial / non-matching text leaves the current selection alone.
//
// BUG #3 — tryAutoPickExact read stale `query` and `value` from its closure.
//   FIX: Both are now read from live refs (queryRef / valueRef) that are
//   assigned synchronously on every render — no useEffect lag.
//
// BUG #5 — useEffect depended on `options.length` which missed in-place name
//   edits.  FIX: effect is gated by an `isEditing` ref so it never stomps the
//   user mid-keystroke, and uses the full `options` array so renamed ledgers
//   update the display correctly.
//
// BUG #8 — Tab path called tryAutoPickExact which could double-pick or mask
//   the real issue.  Still present but now harmless: tryAutoPickExact uses the
//   live refs and the stale-closure clear is gone, so it can only confirm or
//   no-op, never corrupt.
function Picker({ value, onChange, onTextChange, options, placeholder = '', getLabel = (o) => o.name, getMeta, allowCreate = false, onCreate, autoFocus, className = '' }) {
  const [open, setOpen] = useState(false);
  const [query, setQuery] = useState(() => {
    if (!value) return '';
    const o = options.find(o => o.id === value);
    return o ? getLabel(o) : '';
  });
  const [active, setActive] = useState(0);
  const ref = useRef(null);

  // Live refs — assigned synchronously every render so closures always see the
  // latest value without waiting for a useEffect flush.
  const queryRef = useRef(query);
  const valueRef = useRef(value);
  queryRef.current = query;
  valueRef.current = value;

  // Flag: true while the user has focus on this input.  Prevents the sync
  // effect below from stomping the display mid-keystroke.
  const isEditing = useRef(false);

  // Sync display text when the external `value` or the matching option changes
  // (e.g. programmatic reset, ledger name edit in Masters).  Skipped while
  // the user is actively typing so we never overwrite their keystrokes.
  useEffect(() => {
    if (isEditing.current) return;
    if (!value) { setQuery(''); return; }
    const o = options.find(o => o.id === value);
    if (o) setQuery(getLabel(o));
  }, [value, options]); // full `options` ref — catches renamed ledgers

  const filtered = useMemo(() => {
    const q = query.toLowerCase().trim();
    if (!q) return options.slice(0, 50);
    return options.filter(o => getLabel(o).toLowerCase().includes(q)).slice(0, 50);
  }, [query, options]);

  // ── pick() — v2.4 flushSync fix ────────────────────────────────────────
  // Root cause of "Arrow+Enter → Save → toast" bug (confirmed by user):
  // React 18 concurrent mode (createRoot) can DEFER the commit of the
  // setLines({itemId}) triggered by onChange(id, opt). If the user clicks
  // Save before that deferred render commits, save() reads the pre-pick
  // closure where itemId is still ''. The display already showed the item
  // name (setQuery is local state, committed in the same flush), so the pick
  // looked successful but the parent's lines state was stale.
  //
  // ReactDOM.flushSync forces the parent's onChange (→ setLines / setCustomerId
  // / etc.) to commit synchronously inside this event handler, before pick()
  // returns. Any subsequent user event — Tab, typing qty, clicking Save — is
  // processed after the flush, so its closure always sees the correct itemId.
  const pick = (opt) => {
    // Flush parent state update synchronously (fixes concurrent-mode race).
    ReactDOM.flushSync(() => onChange(opt.id, opt));
    setQuery(getLabel(opt));
    setOpen(false);
  };

  const createNew = () => {
    const q = queryRef.current.trim();
    if (!q || !onCreate) return;
    const created = onCreate(q);
    if (created) {
      // flushSync for the same reason as pick() — ensure parent commits synchronously.
      ReactDOM.flushSync(() => onChange(created.id, created));
      setQuery(getLabel(created));
    }
    setOpen(false);
  };

  // Try to resolve the current query to an exact option match.
  // Uses live refs — no stale-closure risk (fixes bug #3).
  // Returns true if a match was found (already selected counts too).
  const tryAutoPickExact = () => {
    const q = queryRef.current.trim().toLowerCase();
    if (!q) return false;
    const exact = options.find(o => getLabel(o).toLowerCase().trim() === q);
    if (exact) {
      if (exact.id !== valueRef.current) {
        onChange(exact.id, exact);
        setQuery(getLabel(exact));
      }
      return true;
    }
    return false;
  };

  const onKey = (e) => {
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      setActive(a => Math.min(a + 1, filtered.length - (allowCreate ? 0 : 1)));
      setOpen(true);
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      setActive(a => Math.max(a - 1, 0));
    } else if (e.key === 'Enter') {
      e.preventDefault();
      if (open && active < filtered.length) pick(filtered[active]);
      else if (allowCreate && queryRef.current.trim()) createNew();
      else tryAutoPickExact();
    } else if (e.key === 'Tab') {
      // Tab moves focus — commit the highlighted row if open, else try exact match.
      // Don't preventDefault — let browser move focus naturally.
      if (open && active >= 0 && active < filtered.length) {
        pick(filtered[active]);
      } else {
        tryAutoPickExact();
      }
      setOpen(false);
    } else if (e.key === 'Escape') {
      setOpen(false);
    }
  };

  // ── handleInput (v2.4 fix for bug #1) ─────────────────────────────────
  // Previous versions called onChange('', null) whenever typed text didn't
  // exactly match any option.  Because `value` was read from a stale closure
  // (already updated to the picked id from the previous render), typing even
  // one extra character after hitting an exact match wiped itemId.
  //
  // New contract:
  //   • Exact match   → notify parent immediately (fast-pick, kills blur race)
  //   • Empty field   → clear parent (user deleted everything intentionally)
  //   • Partial text  → leave parent value alone; notify onTextChange only
  //     (allowCreate pickers use this to track a typed-but-not-yet-saved name)
  //
  // On blur we revert the display to the current selection for non-create
  // pickers, so stale text never silently survives into save().
  const handleInput = (v) => {
    setQuery(v);
    setOpen(true);
    setActive(0);

    if (!v.trim()) {
      // Field fully cleared → clear the parent's selection
      if (valueRef.current) onChange('', null);
      if (onTextChange) onTextChange(v);
      return;
    }

    const trimmed = v.trim().toLowerCase();
    const exact = options.find(o => getLabel(o).toLowerCase().trim() === trimmed);
    if (exact) {
      // Exact match — push id to parent right now so save() never sees ''
      if (exact.id !== valueRef.current) onChange(exact.id, exact);
    } else {
      // Partial / no match — don't touch the parent's current value.
      // For allowCreate pickers the typed text IS the eventual party name.
      if (onTextChange) onTextChange(v);
    }
  };

  // On blur: finalise the selection.
  //   • Exact match found   → select it (handles typed-without-dropdown-click)
  //   • No match, no create → revert display to current selection's label so
  //                           stale partial text doesn't sit in the box
  //   • No match, allowCreate → keep typed text (user intends to create)
  const handleBlur = () => {
    isEditing.current = false;
    const found = tryAutoPickExact();
    if (!found && !allowCreate) {
      // Revert display to whatever is currently selected
      const cur = options.find(o => o.id === valueRef.current);
      setQuery(cur ? getLabel(cur) : '');
    }
    setTimeout(() => setOpen(false), 150);
  };

  return (
    <div className={`relative ${className}`} ref={ref}>
      <input
        value={query}
        autoFocus={autoFocus}
        onChange={(e) => handleInput(e.target.value)}
        onFocus={() => { isEditing.current = true; setOpen(true); }}
        onBlur={handleBlur}
        onKeyDown={onKey}
        placeholder={placeholder}
        className="w-full"
      />
      {open && (
        <div className="suggest">
          {filtered.length === 0 && !allowCreate && (
            <div className="suggest-item text-mute italic">No matches</div>
          )}
          {filtered.map((o, i) => (
            <div key={o.id} className={`suggest-item ${i === active ? 'active' : ''}`}
                 onMouseDown={() => pick(o)} onMouseEnter={() => setActive(i)}>
              <div className="font-medium">{getLabel(o)}</div>
              {getMeta && <div className="meta">{getMeta(o)}</div>}
            </div>
          ))}
          {allowCreate && query.trim() && !filtered.find(o => getLabel(o).toLowerCase() === query.toLowerCase().trim()) && (
            <div className={`suggest-item ${active === filtered.length ? 'active' : ''}`}
                 onMouseDown={createNew}
                 onMouseEnter={() => setActive(filtered.length)}>
              <span className="text-wax font-medium">+ Create</span> "{query.trim()}"
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function Modal({ open, onClose, title, children, footer }) {
  useEffect(() => {
    if (!open) return;
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [open, onClose]);
  if (!open) return null;
  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal-card" onClick={(e) => e.stopPropagation()}>
        <div className="px-6 pt-5 pb-3 border-b border-rule flex items-start justify-between">
          <h3 className="display text-2xl">{title}</h3>
          <button onClick={onClose} className="text-mute hover:text-ink text-xl leading-none">×</button>
        </div>
        <div className="px-6 py-4">{children}</div>
        {footer && <div className="px-6 py-4 border-t border-rule flex justify-end gap-2 bg-paper2/40">{footer}</div>}
      </div>
    </div>
  );
}

// ── QuickItemCreateModal ─────────────────────────────────────────────────────
// Pops up when "+ Create" is clicked on an item picker inside Sales / Purchases.
// Replicates the full Create Item form from Inventory Masters (F7), including
// inline quick-create for Unit, Super Category, and Sub Category.
// Everything created here is immediately persisted to state.
function QuickItemCreateModal({ open, initialName, state, setState, toast, onCreated, onClose }) {
  const [item, setItem] = useState({
    name: '', unitId: '', superCategoryId: '', subCategoryId: '',
    openingBalance: '', lastSalePrice: '', lastPurchasePrice: ''
  });

  // Reset + pre-fill name whenever the modal opens
  useEffect(() => {
    if (open) {
      setItem({
        name: initialName || '', unitId: '', superCategoryId: '', subCategoryId: '',
        openingBalance: '', lastSalePrice: '', lastPurchasePrice: ''
      });
    }
  }, [open]);

  // ── Inline creators — add to state immediately + select in form ──────────
  const quickCreateUnit = (name) => {
    const u = { id: uid('u'), name: name.trim() };
    setState(prev => ({ ...prev, units: [...prev.units, u] }));
    setItem(prev => ({ ...prev, unitId: u.id }));
    return u;
  };
  const quickCreateSuper = (name) => {
    const s = { id: uid('sc'), name: name.trim() };
    setState(prev => ({ ...prev, superCategories: [...prev.superCategories, s] }));
    setItem(prev => ({ ...prev, superCategoryId: s.id, subCategoryId: '' }));
    return s;
  };
  const quickCreateSub = (name) => {
    // Sub category inherits the currently-selected super category
    const s = { id: uid('sb'), name: name.trim(), superCategoryId: item.superCategoryId || '' };
    setState(prev => ({ ...prev, subCategories: [...prev.subCategories, s] }));
    setItem(prev => ({ ...prev, subCategoryId: s.id }));
    return s;
  };

  const saveItem = () => {
    if (!item.name.trim()) { toast('Item name required'); return; }
    const newItem = {
      ...item,
      id: uid('it'),
      name: item.name.trim(),
      openingBalance: Number(item.openingBalance) || 0,
      lastSalePrice: Number(item.lastSalePrice) || 0,
      lastPurchasePrice: Number(item.lastPurchasePrice) || 0,
    };
    setState(prev => ({ ...prev, items: [...prev.items, newItem] }));
    onCreated(newItem);
    onClose();
    toast(`Item "${newItem.name}" created`);
  };

  // Filtered sub-cats based on selected super cat
  const filteredSubs = useMemo(() =>
    state.subCategories.filter(s => !item.superCategoryId || s.superCategoryId === item.superCategoryId),
    [state.subCategories, item.superCategoryId]
  );

  return (
    <div className="modal-bg" style={{ display: open ? 'flex' : 'none', zIndex: 150 }} onClick={onClose}>
      <div className="modal-card" style={{ maxWidth: 560 }} onClick={(e) => e.stopPropagation()}>
        <div className="px-6 pt-5 pb-3 border-b border-rule flex items-start justify-between">
          <div>
            <div className="smcap text-mute text-[10px] mb-0.5">Quick Create</div>
            <h3 className="display text-2xl">New Inventory Item</h3>
          </div>
          <button onClick={onClose} className="text-mute hover:text-ink text-xl leading-none">×</button>
        </div>
        {open && (
          <div className="px-6 py-4 space-y-4">
            {/* Item Name */}
            <div>
              <label className="smcap text-mute block mb-1">Item Name *</label>
              <input
                value={item.name}
                onChange={(e) => setItem(prev => ({ ...prev, name: e.target.value }))}
                className="w-full"
                placeholder="e.g. Helmet V12 Pro"
                autoFocus
              />
            </div>

            {/* Unit + Opening Balance */}
            <div className="grid grid-cols-2 gap-3">
              <div>
                <label className="smcap text-mute block mb-1">Unit</label>
                <div className="text-[11px] text-mute italic mb-1">Type unit name, then pick or "+ Create"</div>
                <Picker
                  value={item.unitId}
                  onChange={(id) => setItem(prev => ({ ...prev, unitId: id }))}
                  options={state.units}
                  placeholder="Pcs / Kg / Ltr…"
                  allowCreate
                  onCreate={quickCreateUnit}
                />
              </div>
              <div>
                <label className="smcap text-mute block mb-1">Opening Balance</label>
                <input
                  className="num w-full"
                  value={item.openingBalance}
                  onChange={(e) => setItem(prev => ({ ...prev, openingBalance: e.target.value }))}
                  placeholder="0"
                />
              </div>
            </div>

            {/* Super / Sub Category */}
            <div className="grid grid-cols-2 gap-3">
              <div>
                <label className="smcap text-mute block mb-1">Super Category</label>
                <Picker
                  value={item.superCategoryId}
                  onChange={(id) => setItem(prev => ({ ...prev, superCategoryId: id, subCategoryId: '' }))}
                  options={state.superCategories}
                  placeholder="Accessories / Tyres…"
                  allowCreate
                  onCreate={quickCreateSuper}
                />
              </div>
              <div>
                <label className="smcap text-mute block mb-1">Sub Category</label>
                <Picker
                  value={item.subCategoryId}
                  onChange={(id) => setItem(prev => ({ ...prev, subCategoryId: id }))}
                  options={filteredSubs}
                  placeholder="Helmets / MRF…"
                  allowCreate
                  onCreate={quickCreateSub}
                />
              </div>
            </div>

            {/* Default Prices */}
            <div className="grid grid-cols-2 gap-3">
              <div>
                <label className="smcap text-mute block mb-1">Default Sale Price</label>
                <input
                  className="num w-full"
                  value={item.lastSalePrice}
                  onChange={(e) => setItem(prev => ({ ...prev, lastSalePrice: e.target.value }))}
                  placeholder="0.00"
                />
              </div>
              <div>
                <label className="smcap text-mute block mb-1">Default Purchase Price</label>
                <input
                  className="num w-full"
                  value={item.lastPurchasePrice}
                  onChange={(e) => setItem(prev => ({ ...prev, lastPurchasePrice: e.target.value }))}
                  placeholder="0.00"
                />
              </div>
            </div>
          </div>
        )}
        <div className="px-6 py-4 border-t border-rule flex justify-end gap-2 bg-paper2/40">
          <button onClick={onClose} className="btn btn-ghost">Cancel</button>
          <button onClick={saveItem} className="btn btn-primary">Create Item ↵</button>
        </div>
      </div>
    </div>
  );
}

function Toast({ msg, onDone }) {
  useEffect(() => {
    if (!msg) return;
    const t = setTimeout(onDone, 2400);
    return () => clearTimeout(t);
  }, [msg]);
  if (!msg) return null;
  return (
    <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-[200] bg-ink text-paper px-5 py-3 rounded-sm shadow-lg text-sm font-medium animate-fadein">
      {msg}
    </div>
  );
}
